    const AudioContext = window.AudioContext || window.webkitAudioContext;

    const play8BitTone = (type, freq, duration, vol = 0.1, slideFreq = null) => {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if(slideFreq) { osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration); }
        gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    };

        if (app) {
            if (isFrozen()) {
                app.style.filter = 'hue-rotate(180deg) saturate(200%)';
                app.style.pointerEvents = 'none';
            } else {
                app.style.filter = 'none';
                app.style.pointerEvents = 'auto';
            }
        }

    const generateSparkline = (history, isPos) => {
        if (!history || history.length < 2) return '';
        const min = Math.min(...history);
        const max = Math.max(...history);
        const range = max - min === 0 ? 1 : max - min;
        
        const points = history.map((val, i) => {
            const x = (i / (history.length - 1)) * 100;
            const y = 30 - ((val - min) / range) * 30; 
            return `${x},${y}`;
        }).join(' ');
        
        const colorClass = isPos ? 'text-red-500' : 'text-blue-500';

        return `
            <svg viewBox="0 -5 100 40" class="w-full h-12 md:h-16 sparkline-svg" preserveAspectRatio="none">
                <polyline points="${points}" fill="none" class="stroke-current ${colorClass}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
            </svg>
        `;
    };

            });

            optionsHtml = roomState.stocks.map(s => `<button onclick="window.confirmUseItem('${itemId}', ${itemIdx}, '${s.id}')" class="w-full bg-slate-700 p-3 rounded-xl mb-2 hover:bg-slate-600 font-bold active:scale-95 transition text-white border border-slate-500">${s.name}</button>`).join('');

                    <h3 class="text-xl font-black mb-4 text-white text-center">🎯 대상 선택</h3>
                    <div class="overflow-y-auto custom-scrollbar flex-grow mb-4 pr-2" id="target-modal-content">
                        ${optionsHtml}
                    </div>

                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };

    window.openYummyStockModal = (itemId, itemIdx, targetId) => {
        const targetPlayer = players.find(p => p.id === targetId);
        if(!targetPlayer) return;

        let stockOptionsHtml = '';
        const targetStocks = Object.entries(targetPlayer.portfolio || {}).filter(([_, amt]) => amt > 0);
        
        if (targetStocks.length === 0) {
            stockOptionsHtml = `
                <div class="text-center text-slate-400 font-bold py-6 bg-slate-900/50 rounded-xl mb-2 border border-slate-700">상대방이 보유한 주식이 없습니다.</div>
                <button onclick="document.getElementById('target-modal').remove()" class="w-full bg-slate-600 p-3 rounded-xl font-bold active:scale-95 transition text-white shadow-md">돌아가기</button>`;
        } else {
            targetStocks.forEach(([sId, amt]) => {
                const s = roomState.stocks.find(x => x.id === sId);
                if(s) {
                    stockOptionsHtml += `<button onclick="window.confirmUseItem('${itemId}', ${itemIdx}, '${targetId}', '${sId}')" class="w-full bg-slate-700 p-3 rounded-xl mb-2 hover:bg-slate-600 flex justify-between items-center active:scale-95 transition text-white border border-slate-500"><span class="font-black">${s.name}</span><span class="text-sm font-bold text-slate-300">${amt}주</span></button>`;
                }
            });

        if(modalContent) {
            modalContent.innerHTML = `<h4 class="text-center text-sm font-bold text-yellow-400 mb-3">${targetPlayer.name}의 주식 목록</h4>${stockOptionsHtml}`;
        }
    };

    window.confirmUseItem = (itemId, itemIdx, targetId, stockId = null) => {
        const m = document.getElementById('target-modal');
        if (m) m.remove();
        sendPlayerAction({ type: 'USE_ITEM', uid: myUid, itemId: itemId, itemIdx: itemIdx, targetId: targetId, stockId: stockId });
    };

    window.showCustomPopup = (title, desc, icon, bgClass, freezeMs = 0) => {
        const container = document.getElementById('modal-container');
        const popupId = 'popup-' + Date.now() + Math.floor(Math.random()*1000);
        if(freezeMs === 0) container.innerHTML = ''; 
        
        let isFrozen = freezeMs > 0;
        let closeBtnHtml = isFrozen ? `<div id="popup-timer-${popupId}" class="text-white font-bold mt-6 bg-black/30 py-3 px-6 rounded-xl border border-white/20 shadow-inner">${(freezeMs/1000).toFixed(1)}초 후 닫기 가능</div>` 
                                    : `<button onclick="document.getElementById('${popupId}').remove()" class="mt-6 bg-black/40 hover:bg-black/60 text-white font-bold py-3 px-6 rounded-xl w-full border border-white/30 transition shadow-lg active:scale-95">확인</button>`;
        
        const html = `
            <div id="${popupId}" class="fixed inset-0 z-[300] flex items-center justify-center bg-black/70 backdrop-blur-sm fade-in px-4" ${!isFrozen ? `onclick="this.remove()"` : ''}>
                <div class="${bgClass} p-8 rounded-3xl text-center text-white border-2 border-white/20 shadow-[0_0_50px_rgba(0,0,0,0.8)] w-full max-w-sm transform popup-anim flex flex-col items-center" onclick="event.stopPropagation()">
                    <div class="text-7xl mb-4 drop-shadow-xl animate-bounce">${icon}</div>
                    <h3 class="font-black text-2xl mb-3 drop-shadow-md text-white">${title}</h3>
                    <p class="font-bold text-lg text-white/90 leading-tight whitespace-pre-line">${desc}</p>
                    ${closeBtnHtml}
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
        
        if (isFrozen) {
            window.vibrateDevice([100, 100, 100]);
            let remaining = freezeMs;
            const inter = setInterval(() => {
                remaining -= 100;
                const timerEl = document.getElementById(`popup-timer-${popupId}`);
                if(timerEl) timerEl.innerText = `${(remaining/1000).toFixed(1)}초 후 닫기 가능`;
                if (remaining <= 0) {
                    clearInterval(inter);
                    const pEl = document.getElementById(popupId);
                    if(pEl) {
                        pEl.setAttribute('onclick', 'this.remove()');
                        if(timerEl) timerEl.outerHTML = `<button onclick="document.getElementById('${popupId}').remove()" class="mt-6 bg-black/40 hover:bg-black/60 text-white font-bold py-3 px-6 rounded-xl w-full border border-white/30 fade-in transition shadow-lg active:scale-95">확인 (닫기)</button>`;
                    }
                }
            }, 100);
        }
    };

    window.toggleChat = () => {
        const panel = document.getElementById('chat-panel');
        if (panel) panel.classList.toggle('chat-open');
    };

    window.sendChat = () => {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (text) {
            sendPlayerAction({ type: 'CHAT', uid: myUid, text: text });
            input.value = '';
        }
    };

    window.updateChatUI = () => {
        const chats = roomState.chats || [];
        if (chats.length < lastChatLength) lastChatLength = 0;

        const hud = document.getElementById('mini-chat-hud');
        if (hud && chats.length > lastChatLength) {
            if (roomState.status === 'playing') {
                for (let i = lastChatLength; i < chats.length; i++) {
                    const msg = chats[i];
                    const isMe = msg.uid === myUid;
                    const msgEl = document.createElement('div');
                    msgEl.className = `inline-block px-4 py-2 rounded-2xl text-xs md:text-sm font-bold shadow-[0_4px_15px_rgba(0,0,0,0.5)] max-w-[90%] break-words fade-in-up pointer-events-auto cursor-pointer ${
                        isMe ? 'bg-indigo-600/95 text-white self-end' : 'bg-slate-800/95 text-slate-100 border border-slate-600/80'
                    } backdrop-blur-md transition-all duration-500 ease-out z-[90]`;
                    
                    msgEl.onclick = window.toggleChat; 
                    msgEl.innerHTML = `<span class="${isMe ? 'hidden' : 'text-yellow-400 text-[10px] md:text-xs mr-1.5'}">${msg.name}</span><br class="${isMe ? 'hidden' : ''}">${msg.text}`;
                    
                    hud.appendChild(msgEl);
                    hud.scrollTop = hud.scrollHeight;

                    setTimeout(() => {
                        msgEl.style.opacity = '0';
                        msgEl.style.transform = 'translateY(-10px)';
                        setTimeout(() => msgEl.remove(), 500); 
                    }, 5000);
                }
            }
        }
        lastChatLength = chats.length;

        const c = document.getElementById('chat-messages');
        if(!c) return;
        const chatHtml = chats.map(msg => `
            <div class="text-sm ${msg.uid === myUid ? 'flex flex-col items-end' : 'flex flex-col items-start'} fade-in">
                <span class="text-[10px] text-slate-400 font-bold mb-0.5 ml-1">${msg.name}</span>
                <div class="inline-block px-4 py-2.5 rounded-2xl ${msg.uid === myUid ? 'bg-indigo-600 text-white rounded-tr-none shadow-[0_4px_10px_rgba(79,70,229,0.3)]' : 'bg-slate-700 text-slate-100 rounded-tl-none border border-slate-600 shadow-md'} max-w-[85%] break-words text-left font-bold text-sm">
                    ${msg.text}
                </div>
            </div>
        `).join('');

        if (c.dataset.lastHtml !== chatHtml) {
            const isScrolledToBottom = c.scrollHeight - c.clientHeight <= c.scrollTop + 20;
            c.innerHTML = chatHtml;
            c.dataset.lastHtml = chatHtml;
            if(isScrolledToBottom) setTimeout(() => c.scrollTop = c.scrollHeight, 50);
        }
    };

    const handleChatVisibility = () => {
        const chatPanel = document.getElementById('chat-panel');
        const chatFab = document.getElementById('chat-fab');
        const miniHud = document.getElementById('mini-chat-hud');
        if(chatPanel && chatFab && miniHud) {
            if (roomState.status === 'playing') {
                if (currentRole === 'player') chatFab.classList.remove('hidden');
                miniHud.classList.remove('hidden');
            } else {
                chatFab.classList.add('hidden');
                miniHud.classList.add('hidden');
                chatPanel.classList.remove('chat-open');
            }
        }
    };

    const sendToPlayer = (uid, payload, conn) => {
        const finalPayload = { ...payload, targetUid: uid }; 
        if (conn && conn.open) conn.send(finalPayload);
        else if (bc) bc.postMessage(finalPayload);
    };

    let broadcastTimeout = null;
    const hostBroadcast = () => {
        if(currentRole !== 'host') return;
        
        if (broadcastTimeout) clearTimeout(broadcastTimeout);
        broadcastTimeout = setTimeout(() => {
            const payload = { type: 'SYNC', roomState, players };
            Object.values(hostConns).forEach(conn => { if(conn && conn.open) conn.send(payload); });
            if(bc) bc.postMessage(payload);

            if(roomState.status === 'lobby') updateLobbyPlayers();
            else if(roomState.status === 'playing') { 
                if(!document.getElementById('host-game-container')) window.renderHostGameSkeleton();
                window.updateHostGameUI(); 
                window.updateChatUI(); 
                handleChatVisibility(); 
            }
            else if(roomState.status === 'ended') { 
                if(roomState.endPhase === 'summary') renderMarketSummary();
                else renderEndScreen(); 
                handleChatVisibility(); 
            }
        }, 100); 
    };

    const handlePlayerAction = (data, conn = null) => {
        if (data.type === 'JOIN') {
            let existingPlayer = players.find(p => p.id === data.uid);
            if (!existingPlayer) {
                if(conn) hostConns[data.uid] = conn;
                players.push({ id: data.uid, name: data.name, cash: 5000, portfolio: {}, avgPrice: {}, items: [], dropBonus: 0, tradeCount: 0, correctAnswers: 0, earnedFromQuiz: 0, itemUseCount: 0, openBookCount: 0, blindedUntil: 0, shieldCount: 0 });
                roomState.chats.push({ uid: 'system', name: '시스템', text: `${data.name}님이 입장하셨습니다.` });
                hostBroadcast();
            } else {
                if(conn) hostConns[data.uid] = conn; 
                existingPlayer.name = data.name; 
                hostBroadcast();
            }
            return;
        }

        let p = players.find(x => x.id === data.uid);
        if(!p) p = { name: 'Host' };

        if (!p.avgPrice) p.avgPrice = {};
        if (p.shieldCount === undefined) p.shieldCount = 0; 

        if (data.type === 'CHAT') {
            roomState.chats.push({ uid: data.uid, name: p.name, text: data.text });
            if(roomState.chats.length > 100) roomState.chats.shift(); 
        }
        else if (data.type === 'BUY') {
            let s = roomState.stocks.find(x => x.id === data.stockId);
            if(s) {
                let cost = s.price * data.amt; 
                if(p.cash >= cost && data.amt > 0) {
                    p.cash -= cost;
                    let oldAmt = p.portfolio[data.stockId] || 0;
                    let oldCost = oldAmt * (p.avgPrice[data.stockId] || 0);
                    p.portfolio[data.stockId] = oldAmt + data.amt;
                    p.avgPrice[data.stockId] = (oldCost + cost) / p.portfolio[data.stockId];
                    p.tradeCount++;
                }
            }
        } 
        else if (data.type === 'SELL') {
            let s = roomState.stocks.find(x => x.id === data.stockId);
            let amt = data.amt === 'ALL' ? (p.portfolio[data.stockId] || 0) : parseInt(data.amt);
            if(amt > 0 && p.portfolio[data.stockId] >= amt) {
                p.cash += s.price * amt;
                p.portfolio[data.stockId] -= amt;
                if(p.portfolio[data.stockId] <= 0) { delete p.portfolio[data.stockId]; delete p.avgPrice[data.stockId]; }
                p.tradeCount++;
            }
        } 
        else if (data.type === 'QUIZ_CORRECT') {
            let isBottom3 = false;
            let sortedForBuff = players.map(pl => {
                let ast = pl.cash;
                Object.entries(pl.portfolio||{}).forEach(([k,v]) => { const st = roomState.stocks.find(x=>x.id===k); if(st) ast += st.price*v; });
                return { id: pl.id, ast };
            }).sort((a,b) => b.ast - a.ast);
            
            let playerRank = sortedForBuff.findIndex(x => x.id === p.id);
            if (sortedForBuff.length - playerRank <= 3 && sortedForBuff.length > 3) {
                isBottom3 = true;
            }

            const r = Math.random();
            let earned = 1000;
            if (r < 0.1) earned = 5000;
            else if (r < 0.3) earned = 3000;
            else if (r < 0.6) earned = 2000;

            if (isBottom3) earned *= 2;

            let bakeryBonus = 0;
            if (p.portfolio['s12'] > 0) {
                bakeryBonus = p.portfolio['s12'] * 500;
                earned += bakeryBonus;
            }

            p.cash += earned;
            p.correctAnswers++;
            p.earnedFromQuiz = (p.earnedFromQuiz || 0) + earned;
            if (data.usedOpenBook && p.openBookCount > 0) p.openBookCount--;
            
            let dropRate = 0.10 + (p.dropBonus || 0);
            if (isBottom3) dropRate += 0.50;

            let acquiredItem = null;
            if (Math.random() < dropRate) {
                let r2 = Math.random();
                if (isBottom3) r2 = r2 * 0.3;
                
                let t = r2 < 0.1 ? 'S' : (r2 < 0.3 ? 'A' : (r2 < 0.6 ? 'B' : 'C'));
                let itemCands = ITEMS.filter(i => i.tier === t);
                let item = itemCands.length > 0 ? itemCands[Math.floor(Math.random() * itemCands.length)] : ITEMS[ITEMS.length-1];
                
                if(p.items.length >= 3) {
                    p.cash += 3000; 
                    sendToPlayer(data.uid, { type: 'EVENT_ITEM_FULL' }, conn);
                } else {
                    p.items.push(item);
                    acquiredItem = item; 
                }
            }
            sendToPlayer(data.uid, { type: 'EVENT_QUIZ_RESULT', earned: earned, bakeryBonus: bakeryBonus, item: acquiredItem }, conn);
        } 
        else if (data.type === 'USE_ITEM') {
            if ((data.itemId === 'i19' || data.itemId === 'i20') && roomState.phase !== 'hint') {
                sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: '이 아이템은 [예측 힌트]가 화면에 떴을 때 사용해야 정확한 결과를 알 수 있습니다!\n(아이템을 돌려받았습니다)' }, conn);
                return; 
            }

            p.items.splice(data.itemIdx, 1);
            p.itemUseCount = (p.itemUseCount || 0) + 1;
            
            if (data.itemId === 'i10') {
                p.shieldCount = (p.shieldCount || 0) + 1;
                sendToPlayer(data.uid, { type: 'EVENT_SHIELD_ON', count: p.shieldCount }, conn);
            } else if (data.itemId === 'i1') {
                p.dropBonus = (p.dropBonus || 0) + 0.1;
                sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: '영구적으로 아이템 획득 확률이 10% 증가했습니다!' }, conn);
            } else if (data.itemId === 'i6') {
                p.cash += 50000;
                sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: '현금 50,000원을 획득했습니다!' }, conn);
            } else if (data.itemId === 'i8') {
                p.cash += 20000;
                sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: '현금 20,000원을 획득했습니다!' }, conn);
            } else if (data.itemId === 'i9') {
                p.cash += 5000;
                sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: '현금 5,000원을 획득했습니다!' }, conn);
            } else if (data.itemId === 'i19' || data.itemId === 'i20') {
                let outcome = NEWS_EVENTS[roomState.nextEventIndex].results[roomState.nextOutcomeIndex];
                let downStocks = []; let upStocks = [];
                if(outcome.impact < 0 && outcome.targets) downStocks.push(...outcome.targets);
                if(outcome.impact > 0 && outcome.targets) upStocks.push(...outcome.targets);
                if(outcome.down_impact < 0 && outcome.down_targets) downStocks.push(...outcome.down_targets);
                if(outcome.down_impact > 0 && outcome.down_targets) upStocks.push(...outcome.down_targets);
                
                if (data.itemId === 'i19') {
                    let names = downStocks.map(id => roomState.stocks.find(s=>s.id===id).name).join(', ');
                    if(!names) names = '해당 없음 (폭락장 면면 특정 불가)';
                    sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: `📉 다음 폭락 확정 종목:\n[${names}]` }, conn);
                } else {
                    let names = upStocks.map(id => roomState.stocks.find(s=>s.id===id).name).join(', ');
                    if(!names) names = '해당 없음 (폭등장 면면 특정 불가)';
                    sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: `📈 다음 폭등 확정 종목:\n[${names}]` }, conn);
                }
            } 
            else if (data.itemId === 'i3') { 
                const nextEvt = NEWS_EVENTS[roomState.nextEventIndex];
                const hintTarget = nextEvt.results[roomState.nextOutcomeIndex].targets ? nextEvt.results[roomState.nextOutcomeIndex].targets[0] : 's1';
                const stockName = roomState.stocks.find(s=>s.id===hintTarget)?.name || '알수없음';
                sendToPlayer(data.uid, { type: 'EVENT_HINT', stockName: stockName }, conn);
            }
            else if (data.itemId === 'i11') { 
                p.openBookCount = 5;
                sendToPlayer(data.uid, { type: 'EVENT_OPENBOOK' }, conn);
            }
            else if (data.itemId === 'i4') { 
                let target = players.find(x => x.id === data.targetId);
                if(target) {
                    if (target.shieldCount > 0) {
                        target.shieldCount--;
                        sendToPlayer(target.id, { type: 'EVENT_DEFENDED', from: p.name, remain: target.shieldCount }, hostConns[target.id] || null);
                        sendToPlayer(data.uid, { type: 'EVENT_ATTACK_BLOCKED', targetName: target.name }, conn);
                    } else {
                        let stolen = Math.floor(target.cash * 0.5);
                        p.cash += stolen; target.cash -= stolen;
                        sendToPlayer(target.id, { type: 'EVENT_ATTACKED', attackType: 'steal', from: p.name, amt: stolen }, hostConns[target.id] || null);
                        sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: `${target.name}님에게서 현금 ${stolen.toLocaleString()}원을 훔쳤습니다!` }, conn);
                    }
                }
            } 
            else if (data.itemId === 'i18') { 
                let target = players.find(x => x.id === data.targetId);
                if(target && target.portfolio[data.stockId] > 0) {
                    if (target.shieldCount > 0) {
                        target.shieldCount--;
                        sendToPlayer(target.id, { type: 'EVENT_DEFENDED', from: p.name, remain: target.shieldCount }, hostConns[target.id] || null);
                        sendToPlayer(data.uid, { type: 'EVENT_ATTACK_BLOCKED', targetName: target.name }, conn);
                    } else {
                        let totalAmt = target.portfolio[data.stockId];
                        let amt = Math.floor(totalAmt / 2);
                        if (amt <= 0 && totalAmt > 0) amt = 1; 
                        
                        let oldAmt = p.portfolio[data.stockId] || 0;
                        let oldCost = oldAmt * (p.avgPrice[data.stockId] || 0);
                        let targetCost = target.avgPrice[data.stockId] || roomState.stocks.find(s=>s.id===data.stockId).price;
                        
                        p.portfolio[data.stockId] = oldAmt + amt;
                        p.avgPrice[data.stockId] = (oldCost + (amt * targetCost)) / p.portfolio[data.stockId];
                        
                        target.portfolio[data.stockId] -= amt;
                        if(target.portfolio[data.stockId] <= 0) {
                            delete target.portfolio[data.stockId];
                            delete target.avgPrice[data.stockId];
                        }
                        
                        let stockName = roomState.stocks.find(s=>s.id===data.stockId).name;
                        sendToPlayer(target.id, { type: 'EVENT_ATTACKED_YUMMY', from: p.name, stockName, amt }, hostConns[target.id] || null);
                        sendToPlayer(data.uid, { type: 'EVENT_YUMMY_SUCCESS', targetName: target.name, stockName, amt }, conn);
                    }
                } else {
                    sendToPlayer(data.uid, { type: 'EVENT_YUMMY_FAIL' }, conn);
                }
            } 
            else if (data.itemId === 'i21') { 
                let target = players.find(x => x.id === data.targetId);
                if(target) {
                    if (target.shieldCount > 0) {
                        target.shieldCount--;
                        sendToPlayer(target.id, { type: 'EVENT_DEFENDED', from: p.name, remain: target.shieldCount }, hostConns[target.id] || null);
                        sendToPlayer(data.uid, { type: 'EVENT_ATTACK_BLOCKED', targetName: target.name }, conn);
                    } else if (target.items.length > 0) {
                        let stealIdx = Math.floor(Math.random() * target.items.length);
                        let stolenItem = target.items.splice(stealIdx, 1)[0];
                        if(p.items.length >= 3) {
                            p.cash += 3000;
                        } else {
                            p.items.push(stolenItem);
                        }
                        sendToPlayer(target.id, { type: 'EVENT_ITEM_STOLEN', from: p.name, itemName: stolenItem.name }, hostConns[target.id] || null);
                        sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: `${target.name}님의 [${stolenItem.name}] 아이템을 훔쳤습니다!` }, conn);
                    } else {
                        sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: `${target.name}님은 현재 가진 아이템이 없습니다...` }, conn);
                    }
                }
            } else if (data.itemId === 'i12') { 
                let target = players.find(x => x.id === data.targetId);
                if(target) {
                    const fakeNewsList = ["🚨 [속보] DS AI랩스 상장폐지 절차 돌입!", "🚨 [속보] 예린스페이스, 로켓 폭발로 파산 위기!", "🚨 [단독] 당신의 폰이 해킹당하고 있습니다!"];
                    const fakeNews = fakeNewsList[Math.floor(Math.random() * fakeNewsList.length)];
                    sendToPlayer(target.id, { type: 'EVENT_SPAM_NEWS', from: p.name, news: fakeNews }, hostConns[target.id] || null);
                    sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: `${target.name}님의 화면에 가짜 뉴스를 도배했습니다!` }, conn);
                }
            } else if (data.itemId === 'i13') { 
                let s = roomState.stocks.find(x => x.id === data.targetId);
                if(s) {
                    s.price = Math.floor(s.price * 1.50);
                    s.pumpedUntil = Date.now() + 10000;
                    roomState.chats.push({ uid: 'system', name: '시스템', text: `📈 누군가의 작전으로 [${s.name}] 주가가 비정상적으로 폭등 중입니다!` });
                }
            } 
            else if (data.itemId === 'i5') { 
                const fTime = Date.now() + 6000; 
                players.forEach(x => { if(x.id !== data.uid) { x.frozenUntil = fTime; x.frozenBy = p.name; } });
                roomState.chats.push({ uid: 'system', name: '시스템', text: `❄️ ${p.name}님이 [아이스 에이지]를 발동했습니다! 자신을 제외한 모두가 6초간 얼어붙습니다.` });
                sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: `나를 제외한 모두를 6초간 얼려버렸습니다!` }, conn);
            } else if (data.itemId === 'i7') { 
                let oldAmt = p.portfolio[data.targetId] || 0;
                let oldCost = oldAmt * (p.avgPrice[data.targetId] || 0);
                p.portfolio[data.targetId] = oldAmt + 1;
                p.avgPrice[data.targetId] = oldCost / p.portfolio[data.targetId]; 
                sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: `선택한 주식 1주를 공짜로 얻었습니다!` }, conn);
            } else if (data.itemId === 'i17') {
                roomState.circuitBreakerUntil = Date.now() + 10000;
                roomState.circuitBreakerBy = p.name;
                roomState.chats.push({ uid: 'system', name: '시스템', text: `🚨 ${p.name}님이 서킷 브레이커를 발동했습니다! 모든 거래가 10초간 정지됩니다.` });
                
                players.forEach(x => {
                    if(x.id !== data.uid) {
                        sendToPlayer(x.id, { type: 'EVENT_CIRCUIT_BREAKER', by: p.name }, hostConns[x.id] || null);
                    }
                });
                sendToPlayer(data.uid, { type: 'EVENT_ITEM_EFFECT', msg: '서킷 브레이커를 발동했습니다! 10초간 거래가 정지됩니다.' }, conn);
            }
        }
        else if (data.type === 'HOST_NEXT_PHASE') {
            roomState.endPhase = 'rankings';
        }
        else if (data.type === 'HOST_WEALTH_TAX') {
            let sortedByAsset = players.map(pl => {
                let ast = pl.cash;
                Object.entries(pl.portfolio||{}).forEach(([k,v]) => { const st = roomState.stocks.find(x=>x.id===k); if(st) ast += st.price*v; });
                return { pl, ast };
            }).sort((a,b) => b.ast - a.ast);
            
            let taxTotal = 0;
            let topLimit = Math.min(5, sortedByAsset.length);
            
            for(let i=0; i<topLimit; i++) {
                let p = sortedByAsset[i].pl;
                let tax = Math.floor(p.cash * 0.20);
                if (tax > 0) {
                    p.cash -= tax;
                    taxTotal += tax;
                }
            }
            
            if (sortedByAsset.length > 5 && taxTotal > 0) {
                let lowerPlayers = sortedByAsset.slice(5);
                let share = Math.floor(taxTotal / lowerPlayers.length);
                lowerPlayers.forEach(x => { x.pl.cash += share; });
            }
            
            roomState.chats.push({ uid: 'system', name: '시스템', text: `🚨 [부유세] 상위권 현금 재산의 20%(${taxTotal.toLocaleString()}원)를 징수하여 하위권에 분배했습니다!` });
            
            players.forEach(p => {
                sendToPlayer(p.id, { type: 'EVENT_WEALTH_TAX', taxTotal }, hostConns[p.id] || null);
            });
        }
        hostBroadcast();
    };

    const sendPlayerAction = (action) => {
        if (currentRole === 'host') handlePlayerAction(action, null);
        else if (myConn && myConn.open) myConn.send(action);
        else if (bc) bc.postMessage({ type: 'PLAYER_ACTION', action });
    };

    window.renderHome = () => {
        window.stopBGM();
        currentRole = null; roomCode = null; isWaitingForResult = false;
        if(peer) peer.destroy(); peer = null;
        if(bc) bc.close(); bc = null;
        if(hostTimerInterval) clearInterval(hostTimerInterval);
        if(playerTimerInterval) clearInterval(playerTimerInterval);
        lastChatLength = 0; handleChatVisibility();

        if(audioCtx.state === 'suspended') {

        let rejoinHtml = '';

                <p class="text-sm text-slate-300 mb-2">이전 접속 기록이 발견되었습니다.</p>
                <button onclick="window.rejoinRoom()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg transition active:scale-95">
                    방 [${savedSession.roomCode}] - ${savedSession.name} 님으로 재접속
                </button>
                <button onclick="window.clearSession()" class="mt-3 text-xs text-slate-500 hover:text-slate-300 underline">접속 기록 초기화</button>
            </div>
            `;
        }

        document.getElementById('app').innerHTML = `
            <button onclick="window.goHostSetup()" class="absolute top-4 left-4 text-slate-400 hover:text-yellow-400 transition flex items-center gap-2 text-sm font-bold bg-slate-800/50 py-2 px-4 rounded-full border border-slate-700 hover:border-yellow-500/50 z-[100]">
                <i class="fas fa-crown"></i> 방 만들기 (선생님)
            </button>

            <div class="flex flex-col items-center justify-center flex-grow fade-in h-full">
                <h1 class="text-4xl md:text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-500 text-center leading-tight mt-8">
                    영단어 주식 타이쿤<br><span class="text-2xl text-yellow-400">🔥 폭풍의 주식시장 🔥</span>
                </h1>
                <p class="text-slate-400 mb-8 text-center text-sm md:text-base">문제를 풀고 주식에 투자해 최고의 부자가 되세요!</p>
                
                <div class="bg-glass p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-sm flex flex-col gap-4 border-2 border-indigo-500/30">
                    <div class="text-center mb-2">
                        <span class="inline-block bg-indigo-600 text-white text-xs font-black px-3 py-1 rounded-full shadow-lg">학생 참가용</span>
                    </div>
                    <input type="text" id="join-code" placeholder="방 번호 (4자리)" class="w-full bg-slate-900 text-white border-2 border-slate-600 rounded-xl px-4 py-4 text-center text-2xl font-black focus:border-indigo-500 uppercase transition shadow-inner placeholder-slate-600" maxlength="4" autocomplete="off">
                    <input type="text" id="join-name" placeholder="내 닉네임" class="w-full bg-slate-900 text-white border-2 border-slate-600 rounded-xl px-4 py-3 text-center text-lg font-bold focus:border-indigo-500 transition shadow-inner placeholder-slate-600" maxlength="10" autocomplete="off">
                    <button onclick="window.joinRoom()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black text-xl py-4 rounded-xl transition shadow-[0_0_20px_rgba(79,70,229,0.4)] active:scale-95 mt-2">
                        게임 참가하기 <i class="fas fa-sign-in-alt ml-1"></i>
                    </button>
                    ${rejoinHtml}
                </div>
            </div>
        `;
    };

    window.rejoinRoom = () => {
        if(!savedSession) return;
        document.getElementById('join-code').value = savedSession.roomCode;
        document.getElementById('join-name').value = savedSession.name;
        window.joinRoom();
    };

    window.clearSession = () => {
        localStorage.removeItem('stockedu_session');
        savedSession = null;
        window.renderHome();
    };

    window.goHostSetup = () => {
        document.getElementById('app').innerHTML = `
            <div class="flex flex-col flex-grow fade-in w-full max-w-md mx-auto pt-10">
                <button onclick="window.renderHome()" class="self-start text-slate-400 hover:text-white mb-6"><i class="fas fa-arrow-left mr-1"></i>뒤로</button>
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-cog mr-2"></i> 게임 설정</h2>
                <div class="bg-glass p-6 rounded-2xl">
                    <div class="bg-indigo-900/50 border border-indigo-500 rounded-xl p-4 mb-6">
                        <h3 class="font-bold text-indigo-300 mb-2"><i class="fas fa-book mr-2"></i>기본 탑재 단어장</h3>
                        <p class="text-sm text-slate-300">필수 영단어 90개가 이미 탑재되어 있습니다. 별도의 파일 업로드 없이 바로 시작할 수 있습니다!</p>

                    <label class="block text-sm font-bold mb-2">총 게임 시간 (분)</label>
                    <input type="number" id="game-duration" value="15" min="3" max="60" class="w-full bg-slate-800 border border-slate-600 rounded p-3 mb-6 font-bold text-center text-white">

                    <button onclick="window.createRoom()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95">방 생성하기</button>
                </div>
            </div>
        `;
    };

    window.createRoom = async () => { 
        let words = DEFAULT_WORDS; 
        
        roomCode = Math.floor(1000 + Math.random() * 9000).toString();
        const durationMs = parseInt(document.getElementById('game-duration').value || 15) * 60 * 1000;
        
        let availableEvents = Array.from({length: NEWS_EVENTS.length}, (_, i) => i);
        
        currentRole = 'host';
        roomState = {
            status: 'lobby', endPhase: null, words: words, stocks: JSON.parse(JSON.stringify(INITIAL_STOCKS)),
            news: "개장 준비 중... 30초 후 첫 뉴스가 발표됩니다.", phase: 'wait', nextPhaseTime: 0, 
            nextEventIndex: 0, nextOutcomeIndex: 0, availableEvents: availableEvents,
            durationMs: durationMs, endTime: 0, chats: [], circuitBreakerUntil: 0, circuitBreakerBy: '', extraTimeTriggered: false
        };
        players = []; hostConns = {}; lastChatLength = 0;

        document.getElementById('app').innerHTML = `<div class="flex flex-col items-center justify-center h-full gap-4"><div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-indigo-500"></div><div class="text-xl font-bold animate-pulse">방 개설 중...</div></div>`;
        
        let hostReady = false;
        const initLobby = () => { if(hostReady) return; hostReady = true; renderLobby(); };

        bc = new BroadcastChannel('stockedu_' + roomCode);
        bc.onmessage = (e) => { if (e.data.type === 'PLAYER_ACTION') handlePlayerAction(e.data.action, null); };

        try {
            peer = new Peer('stockedu-' + roomCode);
            peer.on('open', () => initLobby());
            peer.on('error', () => initLobby());
            peer.on('connection', (conn) => { conn.on('data', (d) => handlePlayerAction(d, conn)); });
        } catch(e) { initLobby(); }
        setTimeout(initLobby, 2000); 
    };

    const renderLobby = () => {
        const isHost = currentRole === 'host';
        document.getElementById('app').innerHTML = `
            <div class="flex flex-col items-center flex-grow fade-in pt-10 w-full max-w-2xl mx-auto h-full">
                <div class="bg-glass px-12 py-8 rounded-3xl mb-8 border border-blue-500/30 text-center w-full shadow-[0_0_20px_rgba(59,130,246,0.2)]">
                    <p class="text-slate-400 mb-1">학생들에게 알려줄 접속 코드</p>
                    <div class="text-7xl font-black text-white tracking-widest font-mono">${roomCode}</div>
                </div>
                <div class="w-full flex justify-between items-end mb-4 px-2">
                    <h3 class="text-lg font-bold">참가자 <span id="player-count" class="text-blue-400 text-2xl ml-1">0</span>명</h3>
                </div>
                <div id="player-grid" class="flex flex-wrap content-start gap-2 w-full flex-grow overflow-y-auto pb-20 custom-scrollbar"></div>
                
                <div class="fixed bottom-0 left-0 w-full p-4 bg-slate-900/90 backdrop-blur border-t border-slate-800 flex justify-center gap-4">
                    ${isHost ? `
                        <button onclick="window.startGame()" id="btn-start" class="w-full max-w-md bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg opacity-50 active:scale-95 transition" disabled>게임 시작</button>
                    ` : `<div class="py-4 text-slate-400 animate-pulse font-bold text-center w-full">호스트가 시작하기를 기다리는 중... ⏳</div>`}
                </div>
            </div>
        `;
        updateLobbyPlayers();
    };

    const updateLobbyPlayers = () => {
        const grid = document.getElementById('player-grid');
        if(grid) grid.innerHTML = players.map(p => `<div class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm font-bold flex items-center shadow-md"><div class="w-2 h-2 rounded-full bg-green-400 mr-2 animate-pulse"></div>${p.name}</div>`).join('');
        const cnt = document.getElementById('player-count'); if(cnt) cnt.innerText = players.length;
        const btn = document.getElementById('btn-start');
        if(btn && currentRole === 'host') { btn.disabled = players.length === 0; btn.classList.toggle('opacity-50', players.length===0); }
    };

    window.triggerWealthTax = () => {
        if (confirm("부유세를 징수하시겠습니까? (1~5등의 현금 20%를 거둬 하위권에게 일괄 분배합니다)")) {
            sendPlayerAction({ type: 'HOST_WEALTH_TAX' });
        }
    };

    window.startGame = () => {
        window.playSound('bgm');
        roomState.status = 'playing';
        roomState.endTime = Date.now() + roomState.durationMs;
        roomState.nextPhaseTime = Date.now() + 30000;
        roomState.chats.push({ uid: 'system', name: '시스템', text: '게임이 시작되었습니다! 장 변동에 주의하세요.' });
        hostBroadcast();
        
        hostTimerInterval = setInterval(() => {
            if(roomState.status !== 'playing') return clearInterval(hostTimerInterval);
            
            const now = Date.now();
            const tr = Math.max(0, Math.floor((roomState.endTime - now) / 1000));
            const el = document.getElementById('h-timer');
            if(el) el.innerText = `${Math.floor(tr/60).toString().padStart(2,'0')}:${(tr%60).toString().padStart(2,'0')}`;
            
            if (now >= roomState.nextPhaseTime && !roomState.extraTimeTriggered) {
                if (roomState.phase === 'wait' || roomState.phase === 'result') {
                    if(roomState.availableEvents.length === 0) {
                        roomState.availableEvents = Array.from({length: NEWS_EVENTS.length}, (_, i) => i);
                    }
                    const rndIdx = Math.floor(Math.random() * roomState.availableEvents.length);
                    roomState.nextEventIndex = roomState.availableEvents.splice(rndIdx, 1)[0];
                    roomState.nextOutcomeIndex = Math.floor(Math.random() * NEWS_EVENTS[roomState.nextEventIndex].results.length);
                    
                    roomState.news = NEWS_EVENTS[roomState.nextEventIndex].hintMsg;
                    roomState.phase = 'hint';
                    roomState.nextPhaseTime = now + 30000;
                    hostBroadcast();
                } else if (roomState.phase === 'hint') {
                    const outcome = NEWS_EVENTS[roomState.nextEventIndex].results[roomState.nextOutcomeIndex];
                    roomState.stocks.forEach(stock => {
                        let multi = 1 + (Math.random() * stock.vol * 2 - stock.vol);
                        if (outcome.targets && outcome.targets.includes(stock.id)) multi += outcome.impact;
                        if (outcome.down_targets && outcome.down_targets.includes(stock.id)) multi += outcome.down_impact;
                        let np = Math.floor(stock.price * multi);
                        np = Math.max(50, Math.min(200000, np)); 
                        np = Math.round(np / 10) * 10;
                        stock.history.push(np);
                        if(stock.history.length > 100) stock.history.shift();
                        stock.price = np;
                    });

                    // 배당금 처리
                    players.forEach(p => {
                        let divMsg = [];
                        let totalDiv = 0;
                        if (p.portfolio['s10'] > 0) {
                            let s10Price = roomState.stocks.find(s=>s.id==='s10').price;
                            let amt = Math.floor(p.portfolio['s10'] * s10Price * 0.05);
                            p.cash += amt; totalDiv += amt;
                            divMsg.push(`[경환캐피탈] 예금 이자 ${amt.toLocaleString()}원`);
                        }
                        if (p.portfolio['s5'] > 0) {
                            let amt = p.portfolio['s5'] * 1500;
                            p.cash += amt; totalDiv += amt;
                            divMsg.push(`[병하전자] 고정 배당금 ${amt.toLocaleString()}원`);
                        }
                        if (totalDiv > 0) {
                            sendToPlayer(p.id, { type: 'EVENT_DIVIDEND', msg: divMsg.join('\n'), total: totalDiv }, hostConns[p.id] || null);
                        }
                    });

                    // 상장폐지 로직
                    roomState.stocks.forEach(stock => {
                        if (stock.price < 300) {
                            let oldName = stock.name;
                            let emojiMatch = oldName.match(/^([^\s]+)\s/);
                            let emoji = emojiMatch ? emojiMatch[1] : '📈';
                            let rawName = oldName.replace(/^[^\s]+\s/, '').replace(/^뉴\(New\)\s/, ''); 
                            stock.name = `${emoji} 뉴(New) ${rawName}`;
                            
                            let initialStock = INITIAL_STOCKS.find(s => s.id === stock.id);
                            let resetPrice = initialStock ? initialStock.price : 5000;
                            
                            stock.price = resetPrice;
                            stock.history.push(resetPrice);
                            
                            players.forEach(p => {
                                if (p.portfolio[stock.id]) {
                                    delete p.portfolio[stock.id];
                                    delete p.avgPrice[stock.id];
                                }
                            });
                            
                            roomState.chats.push({ uid: 'system', name: '시스템', text: `🚨 [상장폐지] ${oldName} 주가가 300원 미만으로 하락하여 휴지조각이 되었습니다.` });
                            
                            Object.values(hostConns).forEach(conn => {
                                if(conn && conn.open) conn.send({ type: 'EVENT_DELISTED', oldName: oldName, newName: stock.name });
                            });
                            if(bc) bc.postMessage({ type: 'EVENT_DELISTED', oldName: oldName, newName: stock.name, targetUid: 'all' });
                        }
                    });

                    roomState.news = outcome.resultMsg;
                    roomState.phase = 'result';
                    roomState.chats.push({ uid: 'system', name: '시스템', text: '🚨 시장이 변동되었습니다! 뉴스를 확인하세요.' });
                    roomState.nextPhaseTime = now + 30000;
                    hostBroadcast();
                }
            }

            let pumped = false;
            roomState.stocks.forEach(stock => {
                if (stock.pumpedUntil && now < stock.pumpedUntil) {
                    stock.price = Math.floor(stock.price * (1 + (Math.random() * 0.02 + 0.01)));
                    stock.history.push(stock.price);
                    if(stock.history.length > 100) stock.history.shift();
                    pumped = true;
                }
            });
            if (pumped) hostBroadcast();
            
            if(tr <= 0) {
                if (!roomState.extraTimeTriggered) {
                    roomState.extraTimeTriggered = true;
                    roomState.endTime = Date.now() + 10500; 
                    
                    if(roomState.availableEvents.length === 0) roomState.availableEvents = Array.from({length: NEWS_EVENTS.length}, (_, i) => i);
                    const rndIdx = Math.floor(Math.random() * roomState.availableEvents.length);
                    roomState.nextEventIndex = roomState.availableEvents.splice(rndIdx, 1)[0];
                    roomState.nextOutcomeIndex = Math.floor(Math.random() * NEWS_EVENTS[roomState.nextEventIndex].results.length);
                    
                    const outcome = NEWS_EVENTS[roomState.nextEventIndex].results[roomState.nextOutcomeIndex];
                    roomState.stocks.forEach(stock => {
                        let multi = 1 + (Math.random() * stock.vol * 2 - stock.vol);
                        if (outcome.targets && outcome.targets.includes(stock.id)) multi += outcome.impact;
                        if (outcome.down_targets && outcome.down_targets.includes(stock.id)) multi += outcome.down_impact;
                        let np = Math.floor(stock.price * multi);
                        np = Math.max(50, Math.min(200000, np)); 
                        np = Math.round(np / 10) * 10;
                        stock.history.push(np);
                        if(stock.history.length > 100) stock.history.shift();
                        stock.price = np;
                    });
                    
                    roomState.news = "🚨 [최종 마감 직전 폭풍 변동!]\n" + outcome.resultMsg;
                    roomState.phase = 'result';
                    roomState.chats.push({ uid: 'system', name: '시스템', text: '🚨 00:00 시간 종료! 최종 시장 폭풍 변동이 몰아쳤습니다! 10초 후 게임이 마감됩니다!' });
                    
                    Object.values(hostConns).forEach(c => { if(c && c.open) c.send({type: 'EVENT_EXTRA_TIME'}); });
                    if(bc) bc.postMessage({type: 'EVENT_EXTRA_TIME', targetUid: 'all'});
                    
                    hostBroadcast();
                } else {
                    window.endGameRoom();
                }
            }
        }, 1000);
    };

    window.endGameRoom = () => {
        window.stopBGM();
        roomState.status = 'ended';
        roomState.endPhase = 'summary'; 
        if(hostTimerInterval) clearInterval(hostTimerInterval);
        hostBroadcast();
    };

    window.joinRoom = () => {
        const c = document.getElementById('join-code').value.toUpperCase();
        const n = document.getElementById('join-name').value.trim();
        if (c.length!==4 || !n) return showCustomPopup("입력 오류", "방 번호와 닉네임을 정확히 입력하세요.", "⚠️", "bg-red-600");
        
        document.getElementById('app').innerHTML = `<div class="flex flex-col items-center justify-center h-full gap-4"><div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-indigo-500"></div><div class="text-xl font-bold animate-pulse">방 접속 중...</div><button onclick="window.renderHome()" class="mt-4 text-slate-400 hover:text-white underline">취소하고 돌아가기</button></div>`;
        
        roomCode = c; currentRole = 'player'; lastChatLength = 0;
        
        localStorage.setItem('stockedu_session', JSON.stringify({ roomCode: c, uid: myUid, name: n }));
        savedSession = { roomCode: c, uid: myUid, name: n };

        let joinTimeout = setTimeout(() => {
            if (!myData) { showCustomPopup("접속 지연", "네트워크가 불안정합니다. 다시 시도해주세요.", "⏳", "bg-orange-600"); window.renderHome(); }
        }, 10000); 

        const handleSync = (data) => {
            if (joinTimeout) { clearTimeout(joinTimeout); joinTimeout = null; }
            const prevStatus = roomState.status;
            const prevPhase = roomState.endPhase;
            roomState = data.roomState;
            players = data.players;
            myData = players.find(p => p.id === myUid);
            
            if (roomState.status === 'lobby') renderLobby();
            else if (roomState.status === 'playing') {
                if(prevStatus !== 'playing') {
                    window.playSound('bgm');
                    document.getElementById('app').innerHTML = ''; 
                    renderPlayerGame(); 
                    handleChatVisibility();
                } else {
                    window.updatePlayerGameUI(); 
                }
                window.updateChatUI();
            }
            else if (roomState.status === 'ended') {
                if(roomState.endPhase === 'summary' && prevPhase !== 'summary') {
                    document.getElementById('app').innerHTML = ''; 
                    renderMarketSummary();
                }
                else if(roomState.endPhase === 'rankings' && prevPhase !== 'rankings') {
                    window.stopBGM();
                    document.getElementById('app').innerHTML = ''; 
                    renderEndScreen();
                }
                handleChatVisibility();
            }
        };

        bc = new BroadcastChannel('stockedu_' + roomCode);
        bc.onmessage = (e) => {
            const data = e.data;
            if (data.type === 'SYNC') handleSync(data);
            else if (data.type === 'EVENT_QUIZ_RESULT' && data.targetUid === myUid) {
                isWaitingForResult = false;
                window.vibrateDevice(50); window.flashScreen('bg-green-400/30'); window.playSound('coin');
                let extraMsg = data.bakeryBonus > 0 ? `\n(지원베이커리 혜택 +${data.bakeryBonus.toLocaleString()}원 포함!)` : '';
                
                if (data.item) {
                    window.playSound('item');
                    extraMsg += `\n\n🎁 [${data.item.tier}급] ${data.item.name} 획득!`;
                }
                
                showCustomPopup("정답!", `총 ${data.earned.toLocaleString()}원을 확보했습니다.${extraMsg}`, "⭕", "bg-green-600");
                quizCurrentQuestion = null;
                document.getElementById('player-game-container').outerHTML = '';
                renderPlayerGame();
            }
            else if (data.type === 'EVENT_EXTRA_TIME' && (data.targetUid === 'all' || data.targetUid === myUid)) {
                window.playSound('siren');
                window.flashScreen('bg-red-600/50');
                showCustomPopup('🚨 시간 종료! 라스트 댄스 10초!', '00:00 시간 마감! 마지막 시장 대폭풍 변동이 적용되었습니다!\n정확히 10초 후 최종 마감 시상식으로 이동합니다!', '⏰', 'bg-red-800', 4000);
            }
            else if (data.type === 'EVENT_DIVIDEND' && data.targetUid === myUid) {
                window.playSound('coin');
                showCustomPopup("💰 배당금 입금", data.msg, "💵", "bg-green-700");
            }
            else if (data.type === 'EVENT_DELISTED' && (data.targetUid === 'all' || data.targetUid === myUid)) {
                window.vibrateDevice([500, 200, 500]); window.flashScreen('bg-red-700/60'); window.playSound('siren');
                showCustomPopup("🚨 상장폐지!", `[${data.oldName}] 주가가 300원 미만으로 떨어져 상장폐지되었습니다!\n보유 주식이 모두 휴지조각이 되었습니다.\n(이후 '${data.newName}'(으)로 재상장됩니다)`, "💀", "bg-red-800", 3000);
                document.getElementById('player-game-container')?.remove();
                renderPlayerGame();
            }
            else if (data.type === 'EVENT_WEALTH_TAX' && data.targetUid === myUid) {
                window.vibrateDevice([300, 100, 300]); window.flashScreen('bg-yellow-500/50'); window.playSound('siren');
                showCustomPopup("🚨 부유세 징수!", `정부가 재산이 많은 사람들에게 세금을 더 걷어서 국민들에게 지원금을 나눠줍니다!\n(총 분배액: ${data.taxTotal.toLocaleString()}원)`, "💸", "bg-yellow-700", 3000);
                document.getElementById('player-game-container')?.remove();
                renderPlayerGame();
            }
            else if (data.type === 'EVENT_ITEM_EFFECT' && data.targetUid === myUid) {
                window.playSound('item');
                showCustomPopup('아이템 사용', data.msg, '✨', 'bg-indigo-600');
            }
            else if (data.type === 'EVENT_SHIELD_ON' && data.targetUid === myUid) {
                window.playSound('item');
                showCustomPopup('🛡️ 방어막 가동!', `방어막이 활성화 되었습니다.\n(현재 방어 횟수: ${data.count}회)`, '🛡️', 'bg-blue-600');
                document.getElementById('player-game-container').outerHTML = '';
                renderPlayerGame();
            }
            else if (data.type === 'EVENT_ITEM_FULL' && data.targetUid === myUid) {
                window.playSound('coin');
                showCustomPopup('가방 가득 참!', `인벤토리가 부족하여 아이템 대신 현금 3,000원으로 환전되었습니다!`, '💰', 'bg-slate-700'); 
            }
            else if (data.type === 'EVENT_HINT' && data.targetUid === myUid) { showCustomPopup('극비 정보', `곧 [${data.stockName}] 주가에\n큰 변동이 있을 예정입니다.`, '🤫', 'bg-yellow-600'); }
            else if (data.type === 'EVENT_ATTACKED' && data.targetUid === myUid) { handleAttacked(data); }
            else if (data.type === 'EVENT_ITEM_STOLEN' && data.targetUid === myUid) {
                window.vibrateDevice([200, 100]); window.flashScreen('bg-purple-500/50'); window.playSound('wrong');
                showCustomPopup('✋ 나쁜 손!', `${data.from}님이 당신의 [${data.itemName}] 아이템을 훔쳐갔습니다!`, '🥷', 'bg-purple-800');
                document.getElementById('player-game-container')?.remove();
                renderPlayerGame();
            }
            else if (data.type === 'EVENT_ATTACKED_YUMMY' && data.targetUid === myUid) {
                window.vibrateDevice([200, 100, 200]); window.flashScreen('bg-purple-500/50'); window.playSound('attacked');
                showCustomPopup('🚨 적대적 인수 당함!', `${data.from}님이 당신의 [${data.stockName}] 주식\n지분의 절반(${data.amt}주)을 강제로 인수 합병했습니다!`, '😋', 'bg-purple-800');
            }
            else if (data.type === 'EVENT_YUMMY_SUCCESS' && data.targetUid === myUid) {
                window.playSound('coin'); window.flashScreen('bg-green-400/30');
                showCustomPopup('🎯 인수 성공!', `${data.targetName}님의 [${data.stockName}] 주식\n절반(${data.amt}주)을 강제로 빼앗아왔습니다!`, '😋', 'bg-green-600');
            }
            else if (data.type === 'EVENT_YUMMY_FAIL' && data.targetUid === myUid) {
                showCustomPopup('❌ 텅~', `아쉽지만 상대방이 해당 주식을 더이상 안 가지고 있습니다.`, '😋', 'bg-slate-700');
            }
            else if (data.type === 'EVENT_DEFENDED' && data.targetUid === myUid) {
                window.vibrateDevice([100, 100]); 
                showCustomPopup('🛡️ 방어 성공!', `${data.from}님의 치명적인 공격을 방어막으로 막아냈습니다!\n(남은 방어 횟수: ${data.remain}회)`, '🛡️', 'bg-blue-700');
                document.getElementById('player-game-container').outerHTML = '';
                renderPlayerGame();
            }
            else if (data.type === 'EVENT_ATTACK_BLOCKED' && data.targetUid === myUid) {
                window.vibrateDevice([100, 100]); showCustomPopup('❌ 공격 실패', `아뿔싸! ${data.targetName}님이 방어막을 가동하고 있었습니다!`, '🛡️', 'bg-red-700');
            }
            else if (data.type === 'EVENT_OPENBOOK' && data.targetUid === myUid) {
                showCustomPopup('📖 오픈북 발동!', '다음 5번의 퀴즈는 오답이 사라지고 정답만 보입니다!', '📖', 'bg-indigo-600');
            }
            else if (data.type === 'EVENT_CIRCUIT_BREAKER') {
                window.playSound('siren'); window.flashScreen('bg-red-600/40');
                showCustomPopup('🚨 서킷 브레이커', `${data.by}님이 서킷 브레이커를 발동했습니다!\n10초간 모든 거래가 중지됩니다.`, '🛑', 'bg-red-800');
            }
            else if (data.type === 'EVENT_SPAM_NEWS' && data.targetUid === myUid) {
                window.vibrateDevice([200, 50, 200]); window.flashScreen('bg-red-600/50'); window.playSound('siren');
                for(let i=0; i<6; i++) {
                    setTimeout(() => {
                        let div = document.createElement('div');
                        div.className = 'fixed z-[9999] bg-red-800 border-4 border-red-500 p-4 rounded-xl shadow-2xl flex flex-col items-center justify-center animate-bounce cursor-pointer w-48 text-center';
                        div.style.left = (5 + Math.random()*60) + '%';
                        div.style.top = (5 + Math.random()*60) + '%';
                        div.style.transform = `rotate(${(Math.random()-0.5)*30}deg)`;
                        div.style.pointerEvents = 'auto'; 
                        div.innerHTML = `<div class="text-3xl mb-2">📰</div><div class="text-white font-black whitespace-pre-wrap pointer-events-none">${data.news}</div><div class="text-xs text-yellow-300 mt-2 font-bold animate-pulse pointer-events-none">(터치해서 닫기)</div>`;
                        
                        const closeFunc = function(e) { e.preventDefault(); e.stopPropagation(); window.playSound('tick'); this.remove(); };
                        div.onclick = closeFunc;
                        div.ontouchstart = closeFunc; 
                        
                        document.body.appendChild(div);
                    }, i * 150);
                }
            }
        };

        try {
            peer = new Peer();
            peer.on('open', () => {
                myConn = peer.connect('stockedu-' + roomCode);
                myConn.on('open', () => { myConn.send({ type: 'JOIN', uid: myUid, name: n }); });
                myConn.on('data', (data) => { bc.onmessage({data: data}); });
            });
            peer.on('error', (err) => { 
                if(err.type === 'peer-unavailable') { 
                    clearTimeout(joinTimeout); showCustomPopup("입장 불가", "존재하지 않는 방입니다.", "❌", "bg-red-600"); window.renderHome(); 
                } 
            });
        } catch(e) { }

        setTimeout(() => { if(!myData) sendPlayerAction({ type: 'JOIN', uid: myUid, name: n }); }, 500);
    };

    const handleAttacked = (data) => {
        window.playSound('attacked');
        if (data.attackType === 'steal') {
            window.vibrateDevice([100, 100, 100]); window.flashScreen('bg-purple-500/50');
            showCustomPopup('💸 소매치기 당함!', `${data.from}님이 당신의 현금 지분의 무려 50%인\n${data.amt.toLocaleString()}원을 강탈해갔습니다!`, '🥷', 'bg-purple-700');
        }
    };

    window.switchTab = (tab) => { 
        currentTab = tab; 
        window.vibrateDevice(10); 
        document.getElementById('player-game-container').outerHTML = '';
        renderPlayerGame(); 
    };

    let isUpdatingUI = false;
    window.updatePlayerGameUI = () => {
        if(!myData || !document.getElementById('player-game-container') || isUpdatingUI) return;
        
        isUpdatingUI = true;
        requestAnimationFrame(() => {
            if (lastNewsMsg && lastNewsMsg !== roomState.news) {
                window.flashScreen('bg-yellow-500/20');
                window.vibrateDevice([100, 50, 100, 50, 100]);
                window.playSound('siren');
                document.getElementById('app-container').classList.add('shake-screen');
                setTimeout(() => document.getElementById('app-container').classList.remove('shake-screen'), 500);
                
                const nEl = document.getElementById('news-ticker-container');
                if(nEl) { nEl.classList.add('bg-red-600'); setTimeout(() => nEl.classList.remove('bg-red-600'), 1000); }
            }
            lastNewsMsg = roomState.news;
            
            checkFreezeState();

            const isBlinded = myData.blindedUntil && Date.now() < myData.blindedUntil;
            const cbActive = roomState.circuitBreakerUntil && Date.now() < roomState.circuitBreakerUntil;

            let totalAsset = myData.cash;
            const myStocks = Object.entries(myData.portfolio || {}).filter(([_, amt]) => amt > 0);
            myStocks.forEach(([sId, amt]) => {
                const s = roomState.stocks.find(x => x.id === sId);
                if(s) totalAsset += s.price * amt;
            });

            // 랭킹 데이터 계산
            let sortedRank = players.map(pl => {
                let ast = pl.cash;
                Object.entries(pl.portfolio||{}).forEach(([k,v]) => { const st = roomState.stocks.find(x=>x.id===k); if(st) ast += st.price*v; });
                return { id: pl.id, name: pl.name, ast: ast };
            }).sort((a,b) => b.ast - a.ast);

            let top10 = sortedRank.slice(0, 10);
            let myRankIndex = sortedRank.findIndex(p => p.id === myUid);
            let myRankInfo = myRankIndex !== -1 ? sortedRank[myRankIndex] : { name: myData.name, ast: totalAsset };
            let myRankStr = myRankIndex !== -1 ? `${myRankIndex + 1}위` : '-';

            const renderRankItem = (p, idx) => {
                const isMe = p.id === myUid;
                const rankColor = idx === 0 ? 'text-yellow-400' : (idx === 1 ? 'text-slate-300' : (idx === 2 ? 'text-orange-400' : 'text-slate-400'));
                const bgClass = isMe ? 'bg-indigo-900/60 border-indigo-500' : 'bg-slate-800 border-slate-700';
                return `<div class="flex justify-between items-center p-2 rounded-lg border ${bgClass} shadow-sm text-xs md:text-sm">
                            <div class="flex items-center gap-2 truncate pr-2">
                                <span class="font-black w-4 md:w-5 text-center ${rankColor}">${idx + 1}</span>
                                <span class="font-bold text-white truncate ${isMe ? 'text-indigo-300' : ''}">${p.name}</span>
                            </div>
                            <span class="font-black text-emerald-400 shrink-0">${p.ast.toLocaleString()}원</span>
                        </div>`;
            };

            let rankHtml = top10.map((p, i) => renderRankItem(p, i)).join('');
            let myRankHtml = `<div class="flex justify-between items-center p-2 md:p-3 rounded-lg border border-indigo-400 bg-indigo-600/30 shadow-md text-xs md:text-sm mt-1">
                                <div class="flex items-center gap-2 truncate pr-2">
                                    <span class="font-black w-5 md:w-6 text-center text-yellow-300">${myRankStr}</span>
                                    <span class="font-black text-white truncate text-indigo-200">나 (${myRankInfo.name})</span>
                                </div>
                                <span class="font-black text-emerald-400 shrink-0">${myRankInfo.ast.toLocaleString()}원</span>
                            </div>`;

            // PC 랭킹 업데이트
            const desktopList = document.getElementById('desktop-ranking-list');
            const desktopMyRank = document.getElementById('desktop-my-rank');
            if(desktopList && desktopList.dataset.lastHtml !== rankHtml) { desktopList.innerHTML = rankHtml; desktopList.dataset.lastHtml = rankHtml; }
            if(desktopMyRank && desktopMyRank.dataset.lastHtml !== myRankHtml) { desktopMyRank.innerHTML = myRankHtml; desktopMyRank.dataset.lastHtml = myRankHtml; }

            // 모바일 랭킹 업데이트
            const mobileList = document.getElementById('mobile-ranking-list');
            const mobileMyRank = document.getElementById('mobile-my-rank');
            if(mobileList && mobileList.dataset.lastHtml !== rankHtml) { mobileList.innerHTML = rankHtml; mobileList.dataset.lastHtml = rankHtml; }
            if(mobileMyRank && mobileMyRank.dataset.lastHtml !== myRankHtml) { mobileMyRank.innerHTML = myRankHtml; mobileMyRank.dataset.lastHtml = myRankHtml; }

            const assetEl = document.getElementById('player-total-asset');
            const cashEl = document.getElementById('player-cash');
            if(assetEl) assetEl.innerText = `${totalAsset.toLocaleString()} 원`;
            if(cashEl) cashEl.innerText = `보유 현금 ${myData.cash.toLocaleString()}`;

            const newsEl = document.getElementById('player-news-content');
            const newsIcon = document.getElementById('news-icon');
            if(newsEl) {
                const phaseLabel = roomState.phase === 'wait' ? '개장 준비' : (roomState.phase === 'hint' ? '30초 후 변동' : '현재 결과');
                const labelColor = roomState.phase === 'wait' ? 'bg-slate-500' : (roomState.phase === 'hint' ? 'bg-yellow-500 text-black' : 'bg-red-500 text-white');
                const newsHtml = `<span class="text-[10px] font-black ${labelColor} px-1.5 py-0.5 rounded mr-1.5 inline-block mb-1 shadow-sm">${phaseLabel}</span><br>${roomState.news}`;
                if (newsEl.dataset.lastHtml !== newsHtml) {
                    newsEl.innerHTML = newsHtml;
                    newsEl.dataset.lastHtml = newsHtml;
                    if(newsIcon) newsIcon.innerText = (roomState.phase === 'wait' || roomState.phase === 'hint') ? '🤔' : '📰';
                }
            }

            const marketEl = document.getElementById('market-grid');
            if(marketEl && currentTab === 'market') {
                const marketHtml = roomState.stocks.map(s => {
                    const diff = s.history.length>1 ? s.price - s.history[s.history.length-2] : 0;
                    const dispName = isBlinded ? '???' : s.name;
                    const dispPrice = isBlinded ? '???' : s.price.toLocaleString();
                    const diffClass = isBlinded ? 'text-slate-500' : (diff>0 ? 'stock-up' : (diff<0 ? 'stock-down' : 'text-slate-500'));
                    const bgClass = isBlinded ? 'bg-slate-800/80 border-slate-600' : (diff>0 ? 'bg-red-900/20 border-red-500/50' : (diff<0 ? 'bg-blue-900/20 border-blue-500/50' : 'bg-slate-800 border-slate-600'));
                    const diffText = isBlinded ? '- ???' : `${diff>0?'▲':(diff<0?'▼':'-')} ${Math.abs(diff).toLocaleString()}`;
                    const maxBuy = Math.floor(myData.cash / s.price);
                    const disableBuy = cbActive || maxBuy < 1;
                    
                    return `
                    <div class="p-2.5 rounded-xl border ${bgClass} shadow-sm transition-colors duration-300 flex flex-col justify-between h-full bg-glass">
                        <div class="flex justify-between items-start mb-1">
                            <div class="font-black text-xs md:text-sm text-white leading-tight break-keep pr-1 ${isBlinded ? 'blinded-text' : ''}">${dispName}</div>
                        </div>
                        <div class="text-right mb-2 mt-auto">
                            <div class="font-black text-sm md:text-base ${diff!==0 && !isBlinded ? 'price-update' : ''} text-white ${isBlinded ? 'blinded-text' : ''}">${dispPrice}</div>
                            <div class="text-[10px] md:text-xs font-bold ${diffClass}">${diffText}</div>
                        </div>
                        <div class="flex gap-1.5">
                            <button onclick="window.buyStock('${s.id}', 1)" class="flex-1 bg-slate-700/80 hover:bg-slate-600 text-white py-1.5 rounded-md text-[10px] md:text-xs font-bold shadow active:scale-95 transition" ${disableBuy?'disabled style="opacity:0.3"':''}>1주</button>
                            <button onclick="window.buyStock('${s.id}', ${maxBuy})" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-1.5 rounded-md text-[10px] md:text-xs font-black shadow-sm active:scale-95 transition" ${disableBuy?'disabled style="opacity:0.3"':''}>MAX</button>
                        </div>
                    </div>`;
                }).join('');
                
                if (marketEl.dataset.lastHtml !== marketHtml) {
                    marketEl.innerHTML = marketHtml;
                    marketEl.dataset.lastHtml = marketHtml;
                }
            }

            const portEl = document.getElementById('portfolio-list');
            if(portEl && currentTab === 'portfolio') {
                let portHtml = myStocks.length === 0 ? '<div class="text-center text-slate-500 py-10 font-bold bg-slate-800/30 rounded-xl border border-slate-700 border-dashed text-sm">보유 종목이 없습니다.</div>' : '';
                myStocks.forEach(([sId, amt]) => {
                    const s = roomState.stocks.find(x => x.id === sId);
                    if(s) {
                        const avgPrice = myData.avgPrice && myData.avgPrice[sId] ? myData.avgPrice[sId] : s.price;
                        const returnRate = avgPrice > 0 ? ((s.price - avgPrice) / avgPrice) * 100 : 0;
                        
                        const dispName = isBlinded ? '???' : s.name;
                        const dispPriceStr = isBlinded ? '???' : (s.price*amt).toLocaleString();
                        const dispAvgStr = isBlinded ? '???' : Math.round(avgPrice).toLocaleString();
                        
                        const returnClass = isBlinded ? 'text-slate-500' : (returnRate > 0 ? 'text-red-400' : (returnRate < 0 ? 'text-blue-400' : 'text-green-400'));
                        const returnIcon = isBlinded ? '-' : (returnRate > 0 ? '▲' : (returnRate < 0 ? '▼' : '-'));
                        const returnText = isBlinded ? '???' : Math.abs(returnRate).toFixed(1);

                        portHtml += `
                            <div class="bg-slate-800 p-3 md:p-4 rounded-xl mb-2.5 border border-slate-600 shadow-md flex items-center justify-between">
                                <div>
                                    <div class="font-black text-white text-sm md:text-base ${isBlinded ? 'blinded-text' : ''}">${dispName}</div>
                                    <div class="text-slate-400 text-[10px] md:text-xs mt-0.5 font-bold ${isBlinded ? 'blinded-text' : ''}">${amt}주 (평단: ${dispAvgStr}원)</div>
                                </div>
                                <div class="text-right flex flex-col items-end">
                                    <div class="font-black ${isBlinded ? 'text-slate-500 blinded-text' : (returnRate > 0 ? 'text-red-400' : (returnRate < 0 ? 'text-blue-400' : 'text-green-400'))} text-base md:text-lg leading-none mb-1">${dispPriceStr}원</div>

    const generateQuizHtml = () => {
        if (!roomState.words || roomState.words.length === 0) return `<div class="m-auto text-slate-400 font-bold">단어장이 없습니다.</div>`;
        
        if (isWaitingForResult) return `
            <div class="m-auto flex flex-col items-center justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-indigo-500 mb-4"></div>
                <div class="text-indigo-300 font-bold animate-pulse text-lg">호스트 정답 확인 중...</div>
            </div>`;

        if (!quizCurrentQuestion) {
            if (quizWordQueue.length === 0) {
                quizWordQueue = [...roomState.words].sort(() => Math.random() - 0.5);
            }
            const w = quizWordQueue.pop();
            let opts = [w.meaning];
            
            if (!(myData && myData.openBookCount > 0)) {
                let wrongOpts = [];
                let attempts = 0;
                while (wrongOpts.length < 2 && attempts < 100) {
                    const wrong = roomState.words[Math.floor(Math.random() * roomState.words.length)].meaning;
                    if (wrong !== w.meaning && !wrongOpts.includes(wrong)) {
                        wrongOpts.push(wrong);
                    }
                    attempts++;
                }
                opts.push(...wrongOpts);
                opts.sort(() => Math.random() - 0.5);
            }
            quizCurrentQuestion = { word: w.word, correct: w.meaning, options: opts };
        }

        const openBookBadge = (myData && myData.openBookCount > 0) ? `<div class="text-indigo-300 font-black text-sm mb-2 animate-pulse bg-indigo-900/50 px-3 py-1 rounded-full border border-indigo-500">📖 오픈북 찬스 작동 중! (${myData.openBookCount}회 남음)</div>` : '';
        const shieldBadge = (myData && myData.shieldCount > 0) ? `<div class="text-xs bg-blue-600 text-white font-black px-4 py-1.5 rounded-full mb-3 shadow-[0_0_15px_rgba(37,99,235,0.8)] border border-blue-400 animate-pulse">🛡️ 방어막 가동 중! (${myData.shieldCount}회 방어)</div>` : '';
        
        let isBottom3 = false;
        let sortedRank = players.map(pl => {
            let ast = pl.cash;
            Object.entries(pl.portfolio||{}).forEach(([k,v]) => { const st = roomState.stocks.find(x=>x.id===k); if(st) ast += st.price*v; });
            return { id: pl.id, ast };
        }).sort((a,b) => b.ast - a.ast);
        let myRank = sortedRank.findIndex(x => x.id === myUid);

        const bottomBuffBadge = isBottom3 ? `<div class="text-xs bg-red-600 text-white font-black px-4 py-1.5 rounded-full mb-3 shadow-[0_0_15px_rgba(220,38,38,0.8)] border border-red-400 animate-pulse">🔥 꼴찌 구제 버프 발동 중! (상금 2배 / 고급 아이템 확률 UP)</div>` : '';

       return `

                ${bottomBuffBadge}
                ${openBookBadge}
                <div class="text-2xl md:text-4xl font-black mb-4 md:mb-6 text-center text-white bg-slate-800 w-full py-6 md:py-10 rounded-2xl border-4 border-indigo-500 shadow-[0_0_20px_rgba(99,102,241,0.2)] break-words px-3 leading-tight">${quizCurrentQuestion.word}</div>

                    ${quizCurrentQuestion.options.map((opt, i) => `<button onclick="window.submitAnswer('${opt}')" class="w-full bg-slate-700 hover:bg-indigo-600 text-white font-black py-4 rounded-xl text-sm md:text-base transition border-b-4 border-slate-900 hover:border-indigo-800 active:translate-y-1 active:border-b-0 shadow-sm">${opt}</button>`).join('')}

    window.submitAnswer = (ans) => {
        if (!quizCurrentQuestion || !myData || isWaitingForResult) return;

        if (ans === quizCurrentQuestion.correct) {
