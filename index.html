        const rankHtml = sorted.map((p,i)=>`
            <div class="flex items-center bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md shrink-0">
                <div class="w-10 h-10 rounded-full ${i===0?'bg-gradient-to-br from-yellow-400 to-yellow-600 text-white shadow-[0_0_10px_rgba(234,179,8,0.6)]':(i===1?'bg-gradient-to-br from-slate-300 to-slate-500 text-white':(i===2?'bg-gradient-to-br from-orange-400 to-orange-600 text-white':'bg-slate-700 text-slate-300'))} flex items-center justify-center font-black text-xl mr-4">${i+1}</div>
                <div class="font-black text-xl flex-1 text-white truncate">${p.name}</div>
                <div class="text-green-400 font-black text-2xl">${p.t.toLocaleString()}원</div>
            </div>`).join('');
        
        const rankList = document.getElementById('host-rank-list');
        if(rankList && rankList.dataset.lastHtml !== rankHtml) {
            rankList.innerHTML = rankHtml; rankList.dataset.lastHtml = rankHtml;
        }

        const marketHtml = roomState.stocks.map(s=>{
            const diff = s.history.length>1 ? s.price - s.history[s.history.length-2] : 0;
            const diffClass = diff>0 ? 'text-red-400' : (diff<0 ? 'text-blue-400' : 'text-slate-500');
            return `
            <div class="flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md shrink-0">
                <span class="font-black text-lg text-white truncate">${s.name}</span>
                <div class="text-right">
                    <span class="font-black text-2xl text-white ${diff!==0?'price-update':''}">${s.price.toLocaleString()}원</span>
                    <span class="text-lg font-black ml-3 ${diffClass}">${diff>0?'▲':(diff<0?'▼':'-')} ${Math.abs(diff).toLocaleString()}</span>
                </div>
            </div>`}).join('');
            
        const marketList = document.getElementById('host-market-list');
        if(marketList && marketList.dataset.lastHtml !== marketHtml) {
            marketList.innerHTML = marketHtml; marketList.dataset.lastHtml = marketHtml;
        }
    };

    const renderMarketSummary = () => {
        let stocksCalc = roomState.stocks.map(s => {
            const initial = s.history.length > 0 ? s.history[0] : s.price; 
            const diff = s.price - initial;
            const pct = initial > 0 ? (diff / initial) * 100 : 0;
            return { ...s, initial, diff, pct };
        }).sort((a,b) => b.pct - a.pct);

        const topGainer = stocksCalc[0];
        const topLoser = stocksCalc[stocksCalc.length - 1];
        const isHost = currentRole === 'host';

        const html = `
            <div class="flex flex-col w-full h-full p-4 md:p-8 max-w-4xl mx-auto fade-in pt-10">
                <div class="text-center mb-8">
                    <h1 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 drop-shadow-md mb-2">주식 장 마감</h1>
                    <p class="text-slate-300 font-bold text-lg">최종 종목 변동 요약 (그래프)</p>
                </div>
                
                <div class="flex gap-4 mb-8">
                    <div class="flex-1 bg-red-900/40 border border-red-500 rounded-2xl p-5 text-center shadow-lg transform hover:scale-105 transition">
                        <div class="text-3xl mb-2">🚀 최고 상승주</div>
                        <div class="font-black text-2xl text-white mb-1">${topGainer.name}</div>
                        <div class="text-red-400 font-black text-3xl">+${topGainer.pct.toFixed(1)}%</div>
                    </div>
                    <div class="flex-1 bg-blue-900/40 border border-blue-500 rounded-2xl p-5 text-center shadow-lg transform hover:scale-105 transition">
                        <div class="text-3xl mb-2">📉 최악 하락주</div>
                        <div class="font-black text-2xl text-white mb-1">${topLoser.name}</div>
                        <div class="text-blue-400 font-black text-3xl">${topLoser.pct.toFixed(1)}%</div>
                    </div>
                </div>

                <div class="bg-glass rounded-3xl p-6 border border-slate-600 shadow-xl flex-grow overflow-y-auto custom-scrollbar">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${stocksCalc.map(s => {
                            const isPos = s.pct >= 0;
                            const sparkline = generateSparkline(s.history, isPos);
                            return `
                                <div class="flex flex-col p-4 bg-slate-800/80 rounded-2xl border border-slate-700 shadow-md">
                                    <div class="flex justify-between items-end mb-3 border-b border-slate-700 pb-2">
                                        <span class="font-black text-white text-lg">${s.name}</span>
                                        <div class="text-right">
                                            <div class="font-black ${isPos ? 'text-red-400' : 'text-blue-400'} text-xl">${isPos ? '+' : ''}${s.pct.toFixed(1)}%</div>
                                            <div class="text-xs font-bold text-slate-400">${s.initial.toLocaleString()} ➔ ${s.price.toLocaleString()}</div>
                                        </div>
                                    </div>
                                    <div class="w-full relative mt-1 bg-slate-900/50 rounded-lg p-1 overflow-hidden">
                                        ${sparkline}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                
                <div class="mt-8 flex justify-center">
                    ${isHost ? `
                        <button onclick="window.hostGoRankings()" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-black text-xl py-5 px-12 rounded-2xl shadow-[0_0_30px_rgba(79,70,229,0.5)] active:scale-95 transition">
                            최종 시상식 발표하기 <i class="fas fa-arrow-right ml-2"></i>
                        </button>
                    ` : `
                        <div class="text-slate-400 font-bold text-lg animate-pulse">호스트가 시상식을 준비하고 있습니다... 🏆</div>
                    `}
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
    };

    window.hostGoRankings = () => {
        if(currentRole !== 'host') return;
        roomState.endPhase = 'rankings';
        if(myConn) sendPlayerAction({type: 'HOST_NEXT_PHASE'});
        hostBroadcast();
    };

    const renderEndScreen = () => {
        let sorted = players.map(p=>{
            let t=p.cash; let stockVal = 0; let totalCost = 0;
            Object.entries(p.portfolio||{}).forEach(([k,v])=>{
                const s=roomState.stocks.find(x=>x.id===k);
                if(s && v>0) {
                    stockVal += s.price * v;
                    totalCost += (p.avgPrice && p.avgPrice[k] ? p.avgPrice[k] : s.price) * v;
                }
            });
            t += stockVal;
            let returnRate = totalCost > 0 ? ((stockVal - totalCost) / totalCost) * 100 : 0;
            return {...p, total: t, returnRate, stockVal}; 
        }).sort((a,b)=>b.total-a.total);

        if(sorted.length===0) return document.getElementById('app').innerHTML=`<div class="m-auto"><button onclick="window.renderHome()" class="bg-blue-600 px-4 py-2 rounded font-bold">돌아가기</button></div>`;
        
        let awards = [];
        const activePlayers = sorted.filter(p => p.tradeCount > 0);
        const byReturn = [...activePlayers].sort((a,b) => b.returnRate - a.returnRate);

        const maxStockP = [...sorted].sort((a,b) => b.stockVal - a.stockVal)[0];
        if(maxStockP && maxStockP.stockVal > 0) {
            awards.push({ t:"🎩 대송 버핏", d:"주식 자산 1위", n:maxStockP.name, v:maxStockP.stockVal.toLocaleString()+'원', color: "text-blue-400", bg: "border-blue-500" });
        }

        if(byReturn.length > 0 && byReturn[0].returnRate > 0) {
            awards.push({ t:"🚀 존버왕", d:"투자 수익률 1위", n:byReturn[0].name, v:`+${byReturn[0].returnRate.toFixed(1)}%`, color: "text-red-400", bg: "border-red-500" });
        }

        const qK = [...sorted].sort((a,b)=>(b.correctAnswers||0)-(a.correctAnswers||0))[0];
        if(qK && qK.correctAnswers>0) awards.push({ t:"🐜 성실한 개미", d:"정답 횟수 1위", n:qK.name, v:qK.correctAnswers+'번 정답', color: "text-emerald-400", bg: "border-emerald-500" });
        
        const itemK = [...sorted].sort((a,b)=>(b.itemUseCount||0)-(a.itemUseCount||0))[0];
        if(itemK && itemK.itemUseCount>0) awards.push({ t:"🔥 도파민 중독자", d:"아이템 사용 1위", n:itemK.name, v:itemK.itemUseCount+'회', color: "text-purple-400", bg: "border-purple-500" });

        const tK = [...sorted].sort((a,b)=>(b.tradeCount||0)-(a.tradeCount||0))[0];
        if(tK && tK.tradeCount>0) awards.push({ t:"⚡ 야수의 심장", d:"최다 거래 (단타 장인)", n:tK.name, v:tK.tradeCount+'회', color: "text-orange-400", bg: "border-orange-500" });

        if(byReturn.length > 0 && byReturn[byReturn.length-1].returnRate < 0) {
            const clown = byReturn[byReturn.length-1];
            awards.push({ t:"🤡 올해의 광대", d:"투자 손실률 1위", n:clown.name, v:`${clown.returnRate.toFixed(1)}%`, color: "text-slate-400", bg: "border-slate-500" });
        }

        let p1 = sorted[0] || {name: '없음', total: 0};
        let p2 = sorted[1] || {name: '없음', total: 0};
        let p3 = sorted[2] || {name: '없음', total: 0};

        document.getElementById('app').innerHTML = `
            <div class="p-4 max-w-6xl mx-auto w-full fade-in pt-6 h-full flex flex-col">
                <div class="text-6xl text-center mb-1 animate-bounce drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">🎊</div>
                <h1 class="text-4xl md:text-5xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-8 drop-shadow-md">최종 시상식</h1>
                
                <div class="flex flex-col lg:flex-row gap-8 flex-grow overflow-hidden">
                    <div class="flex-1 flex flex-col gap-6 overflow-y-auto custom-scrollbar pr-2 pb-4">
                        <div class="flex items-end justify-center gap-3 h-56 md:h-64 mt-4">
                            <div class="flex flex-col items-center w-[30%] animate-[slideUp_0.8s_ease-out_0.3s_both]">
                                <div class="text-xl md:text-2xl font-black truncate w-full text-center text-slate-200 mb-2 px-1 drop-shadow-md">${p2.name}</div>
                                <div class="w-full bg-gradient-to-b from-slate-300 to-slate-600 rounded-t-2xl h-28 md:h-32 flex flex-col items-center justify-start pt-3 shadow-[0_0_25px_rgba(148,163,184,0.4)] border-t border-slate-100">
                                    <span class="text-4xl drop-shadow-md">🥈</span>
                                    <span class="font-black text-slate-900 text-sm mt-2 px-1 break-all">${p2.total.toLocaleString()}원</span>
                                </div>
                            </div>
                            <div class="flex flex-col items-center w-[35%] animate-[slideUp_0.8s_ease-out_0.9s_both] z-10">
                                <div class="text-4xl animate-pulse mb-2 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)]">👑</div>
                                <div class="text-2xl md:text-3xl font-black truncate w-full text-center text-yellow-400 mb-2 px-1 drop-shadow-md">${p1.name}</div>
                                <div class="w-full bg-gradient-to-b from-yellow-300 to-yellow-600 rounded-t-2xl h-40 md:h-48 flex flex-col items-center justify-start pt-4 shadow-[0_0_35px_rgba(234,179,8,0.6)] border-t border-yellow-100">
                                    <span class="text-5xl drop-shadow-md">🥇</span>
                                    <span class="font-black text-yellow-900 text-base mt-2 px-1 break-all">${p1.total.toLocaleString()}원</span>
                                </div>
                            </div>
                            <div class="flex flex-col items-center w-[30%] animate-[slideUp_0.8s_ease-out_0s_both]">
                                <div class="text-xl md:text-2xl font-black truncate w-full text-center text-orange-300 mb-2 px-1 drop-shadow-md">${p3.name}</div>
                                <div class="w-full bg-gradient-to-b from-orange-400 to-orange-700 rounded-t-2xl h-20 md:h-24 flex flex-col items-center justify-start pt-2 shadow-[0_0_20px_rgba(249,115,22,0.4)] border-t border-orange-200">
                                    <span class="text-3xl drop-shadow-md">🥉</span>
                                    <span class="font-black text-orange-900 text-xs mt-1 px-1 break-all">${p3.total.toLocaleString()}원</span>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                            ${awards.map(a=>`
                                <div class="bg-glass p-4 rounded-2xl text-center border ${a.bg} shadow-xl transform transition hover:scale-105">
                                    <div class="text-base font-black ${a.color} mb-1 drop-shadow-sm">${a.t}</div>
                                    <div class="text-xs font-bold text-slate-300 mb-2 truncate">${a.d}</div>
                                    <div class="text-xl font-black text-white bg-slate-800/80 rounded-xl py-2 mb-2 truncate px-2 border border-slate-600 shadow-inner">${a.n}</div>
                                    <div class="text-emerald-400 font-black text-sm drop-shadow-md">${a.v}</div>
                                </div>`).join('')}
                        </div>
                    </div>
                    
                    <div class="lg:w-1/3 w-full bg-glass p-6 rounded-3xl border border-slate-600 shadow-2xl flex flex-col max-h-[500px] lg:max-h-full">
                        <h3 class="font-black text-2xl mb-4 text-white flex items-center border-b border-slate-600 pb-3"><i class="fas fa-list-ol mr-3 text-blue-400"></i>전체 랭킹</h3>
                        <div class="flex-grow overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-2">
                            ${sorted.map((p,i)=>`
                                <div class="flex justify-between items-center px-4 py-3 ${i===0?'bg-gradient-to-r from-yellow-900/60 to-slate-800 border border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.2)]':'bg-slate-800 border border-slate-700 shadow-md'} rounded-xl text-base">
                                    <span class="font-black flex items-center truncate flex-1"><span class="w-8 text-center mr-3 ${i===0?'text-yellow-400 text-2xl':(i===1?'text-slate-300 text-xl':(i===2?'text-orange-400 text-xl':'text-slate-500 text-lg'))}">${i+1}</span> <span class="truncate text-white">${p.name}</span></span>
                                    <span class="text-green-400 font-black shrink-0 text-xl ml-2">${p.total.toLocaleString()}원</span>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>
                
                <button onclick="window.clearSession()" class="w-full mt-6 bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 border border-slate-500 py-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 transition text-white shrink-0">
                    <i class="fas fa-home mr-2"></i>접속 기록 초기화 후 처음 화면으로
                </button>
            </div>`;
    };

    window.renderHome();
</script>
</body>
</html>
