    window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (event.reason.name === 'SecurityError' || event.reason.message.includes('WebSocket'))) {

    // --- 8-bit Sound Manager ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    const play8BitTone = (type, freq, duration, vol = 0.1, slideFreq = null) => {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if(slideFreq) { osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration); }
        gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    };

        bgm: new Audio('https://www.dropbox.com/scl/fi/2ht3m16mct0lyjpph713f/Storm-of-Stock-Trade-Market.mp3?rlkey=s97fhf9kmwnbzf99g2n67cvu1&st=aotnhgri&dl=1'),
        coin: () => { play8BitTone('square', 800, 0.1, 0.1, 1200); setTimeout(() => play8BitTone('square', 1200, 0.15, 0.1, 1600), 100); },
        wrong: () => { play8BitTone('sawtooth', 300, 0.3, 0.15, 100); },
        tick: () => { play8BitTone('square', 1000, 0.05, 0.05); },
        siren: () => {
            for(let i = 0; i < 3; i++) {
                setTimeout(() => play8BitTone('square', 600, 0.2, 0.1), i * 400);
                setTimeout(() => play8BitTone('square', 400, 0.2, 0.1), i * 400 + 200);
            }
        },
        attacked: () => {
            play8BitTone('sawtooth', 200, 0.1, 0.2, 50);
            setTimeout(() => play8BitTone('sawtooth', 150, 0.1, 0.2, 50), 100);
            setTimeout(() => play8BitTone('sawtooth', 100, 0.2, 0.2, 50), 200);

        item: () => {
            play8BitTone('square', 400, 0.1, 0.1);

    // 선 그래프(Sparkline) 생성 함수
    const generateSparkline = (history, isPos) => {
        if (!history || history.length < 2) return '';
        const min = Math.min(...history);
        const max = Math.max(...history);
        const range = max - min === 0 ? 1 : max - min;
        
        // x는 0~100%, y는 0~30 픽셀 높이에서 반전하여 계산
        const points = history.map((val, i) => {
            const x = (i / (history.length - 1)) * 100;
            const y = 30 - ((val - min) / range) * 30; 
            return `${x},${y}`;
        }).join(' ');
        
        const colorClass = isPos ? 'text-red-500' : 'text-blue-500';

        return `
            <svg viewBox="0 -5 100 40" class="w-full h-12 md:h-16 sparkline-svg" preserveAspectRatio="none">
                <polyline points="${points}" fill="none" class="stroke-current ${colorClass}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
            </svg>
        `;
    };

    window.showCustomPopup = (title, desc, icon, bgClass, freezeMs = 0) => {
        const container = document.getElementById('modal-container');
        const popupId = 'popup-' + Date.now() + Math.floor(Math.random()*1000);
        if(freezeMs === 0) container.innerHTML = ''; 
        
        let isFrozen = freezeMs > 0;
        let closeBtnHtml = isFrozen ? `<div id="popup-timer-${popupId}" class="text-white font-bold mt-6 bg-black/30 py-3 px-6 rounded-xl border border-white/20 shadow-inner">${(freezeMs/1000).toFixed(1)}초 후 닫기 가능</div>`

        const html = `
            <div id="${popupId}" class="fixed inset-0 z-[300] flex items-center justify-center bg-black/70 backdrop-blur-sm fade-in px-4" ${!isFrozen ? `onclick="this.remove()"` : ''}>
                <div class="${bgClass} p-8 rounded-3xl text-center text-white border-2 border-white/20 shadow-[0_0_50px_rgba(0,0,0,0.8)] w-full max-w-sm transform popup-anim flex flex-col items-center" onclick="event.stopPropagation()">

                    <p class="font-bold text-lg text-white/90 leading-tight whitespace-pre-line">${desc}</p>
                    ${closeBtnHtml}
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
        
        if (isFrozen) {
            window.vibrateDevice([100, 100, 100]);
            let remaining = freezeMs;
            const inter = setInterval(() => {
                remaining -= 100;
                const timerEl = document.getElementById(`popup-timer-${popupId}`);
                if(timerEl) timerEl.innerText = `${(remaining/1000).toFixed(1)}초 후 닫기 가능`;
                if (remaining <= 0) {
                    clearInterval(inter);
                    const pEl = document.getElementById(popupId);
                    if(pEl) {
                        pEl.setAttribute('onclick', 'this.remove()');
                        if(timerEl) timerEl.outerHTML = `<button onclick="document.getElementById('${popupId}').remove()" class="mt-6 bg-black/40 hover:bg-black/60 text-white font-bold py-3 px-6 rounded-xl w-full border border-white/30 fade-in transition shadow-lg active:scale-95">확인 (닫기)</button>`;
                    }

            }, 100);

    };

    window.sendChat = () => {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (text) {
            sendPlayerAction({ type: 'CHAT', uid: myUid, text: text });
            input.value = '';
        }
    };

    window.updateChatUI = () => {
        const chats = roomState.chats || [];
        if (chats.length < lastChatLength) lastChatLength = 0;

        const hud = document.getElementById('mini-chat-hud');
        if (hud && chats.length > lastChatLength) {
            if (roomState.status === 'playing') {
                for (let i = lastChatLength; i < chats.length; i++) {
                    const msg = chats[i];
                    const isMe = msg.uid === myUid;
                    const msgEl = document.createElement('div');
                    msgEl.className = `inline-block px-4 py-2 rounded-2xl text-xs md:text-sm font-bold shadow-[0_4px_15px_rgba(0,0,0,0.5)] max-w-[90%] break-words fade-in-up pointer-events-auto cursor-pointer ${
                        isMe ? 'bg-indigo-600/95 text-white self-end' : 'bg-slate-800/95 text-slate-100 border border-slate-600/80'
                    } backdrop-blur-md transition-all duration-500 ease-out z-[90]`;
                    
                    msgEl.onclick = window.toggleChat; 
                    msgEl.innerHTML = `<span class="${isMe ? 'hidden' : 'text-yellow-400 text-[10px] md:text-xs mr-1.5'}">${msg.name}</span><br class="${isMe ? 'hidden' : ''}">${msg.text}`;
                    
                    hud.appendChild(msgEl);
                    hud.scrollTop = hud.scrollHeight;

                    setTimeout(() => {
                        msgEl.style.opacity = '0';
                        msgEl.style.transform = 'translateY(-10px)';
                        setTimeout(() => msgEl.remove(), 500); 
                    }, 5000);
                }
            }
        }
        lastChatLength = chats.length;

        const c = document.getElementById('chat-messages');
        if(!c) return;
        const chatHtml = chats.map(msg => `
            <div class="text-sm ${msg.uid === myUid ? 'flex flex-col items-end' : 'flex flex-col items-start'} fade-in">
                <span class="text-[10px] text-slate-400 font-bold mb-0.5 ml-1">${msg.name}</span>
                <div class="inline-block px-4 py-2.5 rounded-2xl ${msg.uid === myUid ? 'bg-indigo-600 text-white rounded-tr-none shadow-[0_4px_10px_rgba(79,70,229,0.3)]' : 'bg-slate-700 text-slate-100 rounded-tl-none border border-slate-600 shadow-md'} max-w-[85%] break-words text-left font-bold text-sm">
                    ${msg.text}
                </div>
            </div>
        `).join('');

        if (c.dataset.lastHtml !== chatHtml) {
            const isScrolledToBottom = c.scrollHeight - c.clientHeight <= c.scrollTop + 20;
            c.innerHTML = chatHtml;
            c.dataset.lastHtml = chatHtml;
            if(isScrolledToBottom) setTimeout(() => c.scrollTop = c.scrollHeight, 50);
        }
    };

    const handleChatVisibility = () => {
        const chatPanel = document.getElementById('chat-panel');
        const chatFab = document.getElementById('chat-fab');
        const miniHud = document.getElementById('mini-chat-hud');
        if(chatPanel && chatFab && miniHud) {
            if (roomState.status === 'playing') {
                if (currentRole === 'player') chatFab.classList.remove('hidden');
                miniHud.classList.remove('hidden');
            } else {
                chatFab.classList.add('hidden');
                miniHud.classList.add('hidden');
                chatPanel.classList.remove('chat-open');
            }
        }
    };

    // --- Network (Host) & Performance Optimization ---
    
    const sendToPlayer = (uid, payload, conn) => {
        const finalPayload = { ...payload, targetUid: uid }; 
        if (conn && conn.open) conn.send(finalPayload);
        else if (bc) bc.postMessage(finalPayload);
    };

    let broadcastTimeout = null;
    const hostBroadcast = () => {
        if(currentRole !== 'host') return;
        
        if (broadcastTimeout) clearTimeout(broadcastTimeout);
        broadcastTimeout = setTimeout(() => {
            const payload = { type: 'SYNC', roomState, players };
            Object.values(hostConns).forEach(conn => { if(conn && conn.open) conn.send(payload); });
            if(bc) bc.postMessage(payload);

            if(roomState.status === 'lobby') updateLobbyPlayers();
            else if(roomState.status === 'playing') { 
                if(!document.getElementById('host-game-container')) window.renderHostGameSkeleton();
                window.updateHostGameUI(); 
                window.updateChatUI(); 
                handleChatVisibility(); 
            }
            else if(roomState.status === 'ended') { 
                if(roomState.endPhase === 'summary') renderMarketSummary();
                else renderEndScreen(); 
                handleChatVisibility(); 
            }
        }, 100); 
    };

    const handlePlayerAction = (data, conn = null) => {
        if (data.type === 'JOIN') {
            let existingPlayer = players.find(p => p.id === data.uid);
            if (!existingPlayer) {
                if(conn) hostConns[data.uid] = conn;
                players.push({ id: data.uid, name: data.name, cash: 5000, portfolio: {}, avgPrice: {}, items: [], dropBonus: 0, tradeCount: 0, correctAnswers: 0, earnedFromQuiz: 0, openBookCount: 0, blindedUntil: 0 });
                roomState.chats.push({ uid: 'system', name: '시스템', text: `${data.name}님이 입장하셨습니다.` });
                hostBroadcast();
            } else {
                if(conn) hostConns[data.uid] = conn; 
                existingPlayer.name = data.name; 
                hostBroadcast();
            }
            return;
        }

        let p = players.find(x => x.id === data.uid);
        if(!p) p = { name: 'Host' };

        if (!p.avgPrice) p.avgPrice = {};

        if (data.type === 'CHAT') {
            roomState.chats.push({ uid: data.uid, name: p.name, text: data.text });
            if(roomState.chats.length > 100) roomState.chats.shift(); 
        }
        else if (data.type === 'BUY') {
            let s = roomState.stocks.find(x => x.id === data.stockId);
            if(s) {
                let cost = s.price * data.amt; 
                if(p.cash >= cost && data.amt > 0) {
                    p.cash -= cost;
                    let oldAmt = p.portfolio[data.stockId] || 0;
                    let oldCost = oldAmt * (p.avgPrice[data.stockId] || 0);
                    p.portfolio[data.stockId] = oldAmt + data.amt;
                    p.avgPrice[data.stockId] = (oldCost + cost) / p.portfolio[data.stockId];
                    p.tradeCount++;
                }
            }
        } 
        else if (data.type === 'SELL') {
            let s = roomState.stocks.find(x => x.id === data.stockId);
            let amt = data.amt === 'ALL' ? (p.portfolio[data.stockId] || 0) : parseInt(data.amt);
            if(amt > 0 && p.portfolio[data.stockId] >= amt) {
                p.cash += s.price * amt;
                p.portfolio[data.stockId] -= amt;
                if(p.portfolio[data.stockId] <= 0) { delete p.portfolio[data.stockId]; delete p.avgPrice[data.stockId]; }
                p.tradeCount++;
            }
        } 
        else if (data.type === 'QUIZ_CORRECT') {
            const r = Math.random();
            let earned = 1000;
            if (r < 0.1) earned = 5000;
            else if (r < 0.3) earned = 3000;
            else if (r < 0.6) earned = 2000;

            p.cash += earned;
            p.correctAnswers++;
            p.earnedFromQuiz = (p.earnedFromQuiz || 0) + earned;
            if (data.usedOpenBook && p.openBookCount > 0) p.openBookCount--;
            
            const dropRate = 0.10 + (p.dropBonus || 0);
            if (Math.random() < dropRate) {
                let item = ITEMS.filter(i => { let r2 = Math.random(); let t = r2 < 0.1 ? 'S' : (r2 < 0.3 ? 'A' : (r2 < 0.6 ? 'B' : 'C')); return i.tier === t; });
                item = item.length > 0 ? item[Math.floor(Math.random() * item.length)] : ITEMS[ITEMS.length-1];
                if(item.type === 'auto') {
                    if(item.id === 'i1') p.dropBonus = (p.dropBonus || 0) + 0.1;
                    if(item.id === 'i6') p.cash += 50000;
                    if(item.id === 'i8') p.cash += 20000;
                    if(item.id === 'i9') p.cash += 5000;
                } else p.items.push(item);
                sendToPlayer(data.uid, { type: 'EVENT_ITEM_GOT', item: item }, conn);
            }
            sendToPlayer(data.uid, { type: 'EVENT_QUIZ_RESULT', earned: earned }, conn);
        } 
        else if (data.type === 'USE_ITEM') {
            if(data.itemId !== 'i10') p.items.splice(data.itemIdx, 1);
            
            if (data.itemId === 'i2') { 
                let target = players.find(x => x.id === data.targetId);
                if(target) {
                    let shieldIdx = target.items.findIndex(i => i.id === 'i10');
                    if (shieldIdx !== -1) {
                        target.items.splice(shieldIdx, 1);
                        sendToPlayer(data.targetId, { type: 'EVENT_DEFENDED', from: p.name }, hostConns[data.targetId] || null);
                        sendToPlayer(data.uid, { type: 'EVENT_ATTACK_BLOCKED', targetName: target.name }, conn);
                    } else {
                        let tc = p.cash; let tp = {...p.portfolio}; let ta = {...(p.avgPrice||{})};
                        p.cash = target.cash; p.portfolio = {...target.portfolio}; p.avgPrice = {...(target.avgPrice||{})};
                        target.cash = tc; target.portfolio = tp; target.avgPrice = ta;
                        sendToPlayer(data.targetId, { type: 'EVENT_ATTACKED', attackType: 'swap', from: p.name }, hostConns[data.targetId] || null);
                    }
                }
            } else if (data.itemId === 'i4') { 
                let target = players.find(x => x.id === data.targetId);
                if(target) {
                    let shieldIdx = target.items.findIndex(i => i.id === 'i10');
                    if (shieldIdx !== -1) {
                        target.items.splice(shieldIdx, 1);
                        sendToPlayer(data.targetId, { type: 'EVENT_DEFENDED', from: p.name }, hostConns[data.targetId] || null);
                        sendToPlayer(data.uid, { type: 'EVENT_ATTACK_BLOCKED', targetName: target.name }, conn);
                    } else {
                        let stolen = Math.floor(target.cash * 0.1);
                        p.cash += stolen; target.cash -= stolen;
                        sendToPlayer(data.targetId, { type: 'EVENT_ATTACKED', attackType: 'steal', from: p.name, amt: stolen }, hostConns[data.targetId] || null);
                    }
                }
            } else if (data.itemId === 'i11') { 
                p.openBookCount = 5;
                sendToPlayer(data.uid, { type: 'EVENT_OPENBOOK' }, conn);
            } else if (data.itemId === 'i12') { 
                let target = players.find(x => x.id === data.targetId);
                if(target) {
                    const fakeNewsList = ["🚨 [속보] DS AI랩스 상장폐지 절차 돌입!", "🚨 [속보] 일산스페이스웍스, 로켓 폭발로 파산 위기!", "🚨 [단독] 경식디펜스 사장, 회사 자금 들고 해외 도주!"];
                    const fakeNews = fakeNewsList[Math.floor(Math.random() * fakeNewsList.length)];
                    sendToPlayer(data.targetId, { type: 'EVENT_FAKE_NEWS', from: p.name, news: fakeNews }, hostConns[data.targetId] || null);
                }
            } else if (data.itemId === 'i13') { 
                let s = roomState.stocks.find(x => x.id === data.targetId);
                if(s) {
                    s.price = Math.floor(s.price * 1.50);
                    s.pumpedUntil = Date.now() + 10000;
                    roomState.chats.push({ uid: 'system', name: '시스템', text: `📈 누군가의 작전으로 [${s.name}] 주가가 비정상적으로 폭등 중입니다!` });
                }
            } else if (data.itemId === 'i3') { 
                const nextEvt = NEWS_EVENTS[roomState.nextEventIndex];
                const hintTarget = nextEvt.results[roomState.nextOutcomeIndex].targets ? nextEvt.results[roomState.nextOutcomeIndex].targets[0] : 's1';
                const stockName = roomState.stocks.find(s=>s.id===hintTarget)?.name || '알수없음';
                sendToPlayer(data.uid, { type: 'EVENT_HINT', stockName: stockName }, conn);
            } else if (data.itemId === 'i5') { 
                const fTime = Date.now() + 20000;
                players.forEach(x => { if(x.id !== data.uid) { x.frozenUntil = fTime; x.frozenBy = p.name; } });
            } else if (data.itemId === 'i7') { 
                let oldAmt = p.portfolio[data.targetId] || 0;
                let oldCost = oldAmt * (p.avgPrice[data.targetId] || 0);
                p.portfolio[data.targetId] = oldAmt + 1;
                p.avgPrice[data.targetId] = oldCost / p.portfolio[data.targetId]; 
            } else if (data.itemId === 'i14') {
                const bTime = Date.now() + 10000;
                players.forEach(x => { if(x.id !== data.uid) { x.blindedUntil = bTime; x.blindedBy = p.name; } });
            } else if (data.itemId === 'i15') {
                const isWin = Math.random() < 0.5;
                if(isWin) { p.cash *= 2; sendToPlayer(data.uid, { type: 'EVENT_GAMBLE_WIN' }, conn); }
                else { p.cash = Math.floor(p.cash / 2); sendToPlayer(data.uid, { type: 'EVENT_GAMBLE_LOSE' }, conn); }
            } else if (data.itemId === 'i16') {
                let topPlayer = null; let maxAsset = -1;
                players.forEach(pl => {
                    let ast = pl.cash;
                    Object.entries(pl.portfolio||{}).forEach(([k,v]) => { const st = roomState.stocks.find(x=>x.id===k); if(st) ast += st.price*v; });
                    if(ast > maxAsset) { maxAsset = ast; topPlayer = pl; }
                });
                if(topPlayer && topPlayer.id !== data.uid) {
                    let stolen = Math.floor(topPlayer.cash * 0.15);
                    let shieldIdx = topPlayer.items.findIndex(i => i.id === 'i10');
                    if (shieldIdx !== -1) {
                        topPlayer.items.splice(shieldIdx, 1);
                        sendToPlayer(topPlayer.id, { type: 'EVENT_DEFENDED', from: p.name }, hostConns[topPlayer.id] || null);
                        sendToPlayer(data.uid, { type: 'EVENT_ATTACK_BLOCKED', targetName: topPlayer.name }, conn);
                    } else {
                        topPlayer.cash -= stolen; p.cash += stolen;
                        sendToPlayer(topPlayer.id, { type: 'EVENT_ATTACKED', attackType: 'robinhood', from: p.name, amt: stolen }, hostConns[topPlayer.id] || null);
                        sendToPlayer(data.uid, { type: 'EVENT_ROBINHOOD_SUCCESS', amt: stolen, targetName: topPlayer.name }, conn);
                    }
                } else {
                    sendToPlayer(data.uid, { type: 'EVENT_ROBINHOOD_FAIL' }, conn);
                }
            } else if (data.itemId === 'i17') {
                roomState.circuitBreakerUntil = Date.now() + 15000;
                roomState.circuitBreakerBy = p.name;
                roomState.chats.push({ uid: 'system', name: '시스템', text: `🚨 ${p.name}님이 서킷 브레이커를 발동했습니다! 모든 거래가 15초간 정지됩니다.` });
            }
        }
        else if (data.type === 'HOST_NEXT_PHASE') {
            roomState.endPhase = 'rankings';
        }
        hostBroadcast();
    };

    const sendPlayerAction = (action) => {
        if (currentRole === 'host') handlePlayerAction(action, null);
        else if (myConn && myConn.open) myConn.send(action);

    // --- Boot & Home UI ---

    // --- Host Create Room ---
    window.createRoom = async () => { 
        let words = DEFAULT_WORDS; 
        
        roomCode = Math.floor(1000 + Math.random() * 9000).toString();
        const durationMs = parseInt(document.getElementById('game-duration').value || 15) * 60 * 1000;
        
        currentRole = 'host';
        roomState = {

            news: "시장이 곧 개장합니다. 첫 뉴스를 기다려주세요.", phase: 'hint', tick: 0, nextEventIndex: Math.floor(Math.random()*NEWS_EVENTS.length),

        };

    const renderLobby = () => {

        document.getElementById('app').innerHTML = `

                </div>
                <div id="player-grid" class="flex flex-wrap content-start gap-2 w-full flex-grow overflow-y-auto pb-20 custom-scrollbar"></div>
                
                <div class="fixed bottom-0 left-0 w-full p-4 bg-slate-900/90 backdrop-blur border-t border-slate-800 flex justify-center gap-4">
                    ${isHost ? `
                        <button onclick="window.startGame()" id="btn-start" class="w-full max-w-md bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg opacity-50 active:scale-95 transition" disabled>게임 시작</button>
                    ` : `<div class="py-4 text-slate-400 animate-pulse font-bold text-center w-full">호스트가 시작하기를 기다리는 중... ⏳</div>`}
                </div>
            </div>
        `;
        updateLobbyPlayers();
    };

    const updateLobbyPlayers = () => {
        const grid = document.getElementById('player-grid');
        if(grid) grid.innerHTML = players.map(p => `<div class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm font-bold flex items-center shadow-md"><div class="w-2 h-2 rounded-full bg-green-400 mr-2 animate-pulse"></div>${p.name}</div>`).join('');
        const cnt = document.getElementById('player-count'); if(cnt) cnt.innerText = players.length;
        const btn = document.getElementById('btn-start');
        if(btn && currentRole === 'host') { btn.disabled = players.length === 0; btn.classList.toggle('opacity-50', players.length===0); }
    };

    window.startGame = () => {
        window.playSound('bgm');
        roomState.status = 'playing';
        roomState.endTime = Date.now() + roomState.durationMs;
        roomState.chats.push({ uid: 'system', name: '시스템', text: '게임이 시작되었습니다! 장 변동에 주의하세요.' });
        hostBroadcast();
        startMarketEngine();
        
        hostTimerInterval = setInterval(() => {
            if(roomState.status !== 'playing') return clearInterval(hostTimerInterval);
            const tr = Math.max(0, Math.floor((roomState.endTime - Date.now()) / 1000));
            const el = document.getElementById('h-timer');
            if(el) el.innerText = `${Math.floor(tr/60).toString().padStart(2,'0')}:${(tr%60).toString().padStart(2,'0')}`;
            
            let pumped = false;
            roomState.stocks.forEach(stock => {
                if (stock.pumpedUntil && Date.now() < stock.pumpedUntil) {
                    stock.price = Math.floor(stock.price * (1 + (Math.random() * 0.02 + 0.01)));
                    stock.history.push(stock.price);
                    if(stock.history.length > 100) stock.history.shift(); // 선 그래프를 위해 히스토리 제한을 100개로 넉넉하게 변경
                    pumped = true;
                }
            });
            if (pumped) hostBroadcast();
            
            if(tr <= 0) window.endGameRoom();
        }, 1000);
    };

    window.endGameRoom = () => {
        window.stopBGM();
        roomState.status = 'ended';
        roomState.endPhase = 'summary'; 
        if(hostMarketInterval) clearInterval(hostMarketInterval);
        if(hostTimerInterval) clearInterval(hostTimerInterval);
        hostBroadcast();
    };

    const startMarketEngine = () => {
        if (hostMarketInterval) clearInterval(hostMarketInterval);
        
        roomState.nextEventIndex = Math.floor(Math.random() * NEWS_EVENTS.length);
        const initialEvt = NEWS_EVENTS[roomState.nextEventIndex];
        roomState.nextOutcomeIndex = Math.floor(Math.random() * initialEvt.results.length);
        roomState.news = initialEvt.hintMsg;
        roomState.phase = 'hint';
        
        hostBroadcast();

        let lastProcessedSec = -1;

        hostMarketInterval = setInterval(() => {
            const now = Date.now();
            if(roomState.status !== 'playing' || now >= roomState.endTime) {
                if(now >= roomState.endTime) window.endGameRoom();
                return clearInterval(hostMarketInterval);
            }
            
            const secondsRemaining = Math.max(0, Math.floor((roomState.endTime - now) / 1000));
            
            if (secondsRemaining !== lastProcessedSec) {
                if (lastProcessedSec !== -1 && secondsRemaining > 0 && secondsRemaining % 60 === 0) {
                    if (roomState.phase === 'hint') {
                        const eventDef = NEWS_EVENTS[roomState.nextEventIndex];
                        const outcome = eventDef.results[roomState.nextOutcomeIndex];

                        roomState.stocks.forEach(stock => {
                            let multi = 1 + (Math.random() * stock.vol * 2 - stock.vol);
                            if (outcome.targets && outcome.targets.includes(stock.id)) multi += outcome.impact;
                            if (outcome.down_targets && outcome.down_targets.includes(stock.id)) multi += outcome.down_impact;
                            let np = Math.floor(stock.price * multi);
                            np = Math.max(500, Math.min(200000, np));
                            np = Math.round(np / 10) * 10;
                            stock.history.push(np);
                            if(stock.history.length > 100) stock.history.shift(); // 선 그래프를 위해 히스토리 제한을 100개로 넉넉하게 변경
                            stock.price = np;
                        });
                        roomState.news = outcome.resultMsg;
                        roomState.phase = 'result';
                        roomState.chats.push({ uid: 'system', name: '시스템', text: '🚨 시장이 변동되었습니다! 뉴스를 확인하세요.' });
                    } else {
                        roomState.nextEventIndex = Math.floor(Math.random() * NEWS_EVENTS.length);
                        const nextEvt = NEWS_EVENTS[roomState.nextEventIndex];
                        roomState.nextOutcomeIndex = Math.floor(Math.random() * nextEvt.results.length);
                        roomState.news = nextEvt.hintMsg;
                        roomState.phase = 'hint';
                    }
                }
                lastProcessedSec = secondsRemaining;
                hostBroadcast();
            }
        }, 500); 
    };

    // --- Player Join & Sync ---
    window.joinRoom = () => {
        const c = document.getElementById('join-code').value.toUpperCase();
        const n = document.getElementById('join-name').value.trim();
        if (c.length!==4 || !n) return showCustomPopup("입력 오류", "방 번호와 닉네임을 정확히 입력하세요.", "⚠️", "bg-red-600");
        
        document.getElementById('app').innerHTML = `<div class="flex flex-col items-center justify-center h-full gap-4"><div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-indigo-500"></div><div class="text-xl font-bold animate-pulse">방 접속 중...</div><button onclick="window.renderHome()" class="mt-4 text-slate-400 hover:text-white underline">취소하고 돌아가기</button></div>`;
        
        roomCode = c; currentRole = 'player'; lastChatLength = 0;
        
        localStorage.setItem('stockedu_session', JSON.stringify({ roomCode: c, uid: myUid, name: n }));
        savedSession = { roomCode: c, uid: myUid, name: n };

        let joinTimeout = setTimeout(() => {
            if (!myData) { showCustomPopup("접속 지연", "방을 찾을 수 없거나 호스트가 종료했습니다.", "⏳", "bg-orange-600"); window.renderHome(); }
        }, 5000); 

        const handleSync = (data) => {
            if (joinTimeout) { clearTimeout(joinTimeout); joinTimeout = null; }
            const prevStatus = roomState.status;
            const prevPhase = roomState.endPhase;
            roomState = data.roomState;
            players = data.players;
            myData = players.find(p => p.id === myUid);
            
            if (roomState.circuitBreakerUntil && roomState.circuitBreakerUntil > (data.prevCBUntil || 0)) {
                if (roomState.circuitBreakerBy !== myData?.name && roomState.status === 'playing') {
                    window.playSound('siren'); window.flashScreen('bg-red-600/40');
                    showCustomPopup('🚨 서킷 브레이커', `${roomState.circuitBreakerBy}님이 서킷 브레이커를 발동했습니다!\n15초간 모든 거래가 중지됩니다.`, '🛑', 'bg-red-800');
                }
            }

            if (roomState.status === 'lobby') renderLobby();
            else if (roomState.status === 'playing') {
                if(prevStatus !== 'playing') {
                    window.playSound('bgm');
                    document.getElementById('app').innerHTML = ''; 
                    renderPlayerGame(); 
                    handleChatVisibility();
                } else {
                    window.updatePlayerGameUI(); 
                }
                window.updateChatUI();
            }
            else if (roomState.status === 'ended') {
                if(roomState.endPhase === 'summary' && prevPhase !== 'summary') {
                    document.getElementById('app').innerHTML = ''; 
                    renderMarketSummary();
                }
                else if(roomState.endPhase === 'rankings' && prevPhase !== 'rankings') {
                    window.stopBGM();
                    document.getElementById('app').innerHTML = ''; 
                    renderEndScreen();
                }
                handleChatVisibility();
            }
        };

        bc = new BroadcastChannel('stockedu_' + roomCode);
        bc.onmessage = (e) => {
            const data = e.data;
            if (data.type === 'SYNC') handleSync(data);
            else if (data.type === 'EVENT_QUIZ_RESULT' && data.targetUid === myUid) {
                isWaitingForResult = false;
                window.vibrateDevice(50); window.flashScreen('bg-green-400/30'); window.playSound('coin');
                showCustomPopup("정답!", `${data.earned.toLocaleString()}원을 확보했습니다.`, "⭕", "bg-green-600");
                quizCurrentQuestion = null;
                document.getElementById('player-game-container').outerHTML = '';
                renderPlayerGame();
            }
            else if (data.type === 'EVENT_ITEM_GOT' && data.targetUid === myUid) { 
                window.playSound('item');
                showCustomPopup('아이템 획득!', `${data.item.tier}급 ${data.item.name} 획득!`, '🎁', 'bg-gradient-to-br from-purple-500 to-indigo-600'); 
            }
            else if (data.type === 'EVENT_HINT' && data.targetUid === myUid) { showCustomPopup('극비 정보', `곧 [${data.stockName}] 주가에\n큰 변동이 있을 예정입니다.`, '🤫', 'bg-yellow-600'); }
            else if (data.type === 'EVENT_ATTACKED' && data.targetUid === myUid) { handleAttacked(data); }
            else if (data.type === 'EVENT_DEFENDED' && data.targetUid === myUid) {
                window.vibrateDevice([100, 100]); showCustomPopup('🛡️ 방어 성공!', `${data.from}님의 치명적인 공격을 방탄조끼로 막아냈습니다!`, '🛡️', 'bg-blue-700');
            }
            else if (data.type === 'EVENT_ATTACK_BLOCKED' && data.targetUid === myUid) {
                window.vibrateDevice([100, 100]); showCustomPopup('❌ 공격 실패', `아뿔싸! ${data.targetName}님이 방탄조끼를 입고 있었습니다!`, '🛡️', 'bg-red-700');
            }
            else if (data.type === 'EVENT_OPENBOOK' && data.targetUid === myUid) {
                showCustomPopup('📖 오픈북 발동!', '다음 5번의 퀴즈는 오답이 사라지고 정답만 보입니다!', '📖', 'bg-indigo-600');
            }
            else if (data.type === 'EVENT_FAKE_NEWS' && data.targetUid === myUid) {
                window.vibrateDevice([200, 50, 200]); window.flashScreen('bg-red-600/50'); window.playSound('siren');
                showCustomPopup('🚨 [단독 속보]', data.news, '📰', 'bg-red-800');
                setTimeout(() => {
                    window.vibrateDevice(50);
                    showCustomPopup('🤡 속으셨나요?', `방금 전 뉴스는 ${data.from}님이 보낸\n조작된 가짜 뉴스였습니다!`, '🤡', 'bg-purple-700');
                }, 4000);
            }
            else if (data.type === 'EVENT_GAMBLE_WIN' && data.targetUid === myUid) {
                window.playSound('coin'); window.flashScreen('bg-yellow-400/40');
                showCustomPopup('🎰 대박!', `타짜의 주사위 성공!\n현금이 2배가 되었습니다!`, '🎲', 'bg-yellow-600');
            }
            else if (data.type === 'EVENT_GAMBLE_LOSE' && data.targetUid === myUid) {
                window.playSound('wrong'); window.flashScreen('bg-red-600/40');
                showCustomPopup('💸 쪽박...', `타짜의 주사위 실패...\n현금이 반토막 났습니다.`, '🎲', 'bg-red-800');
            }
            else if (data.type === 'EVENT_ROBINHOOD_SUCCESS' && data.targetUid === myUid) {
                window.playSound('coin'); window.flashScreen('bg-green-400/30');
                showCustomPopup('🎯 적중!', `${data.targetName}님의 현금 ${data.amt.toLocaleString()}원을 빼앗았습니다!`, '🏹', 'bg-green-600');
            }
            else if (data.type === 'EVENT_ROBINHOOD_FAIL' && data.targetUid === myUid) {
                showCustomPopup('❌ 실패', `당신이 이미 1등이거나 뺏을 현금이 없습니다.`, '🏹', 'bg-slate-700');
            }
        };

        try {
            peer = new Peer();
            peer.on('open', () => {
                myConn = peer.connect('stockedu-' + roomCode);
                myConn.on('open', () => { myConn.send({ type: 'JOIN', uid: myUid, name: n }); });
                myConn.on('data', (data) => { bc.onmessage({data: data}); });
            });
            peer.on('error', (err) => { 
                if(err.type === 'peer-unavailable') { 
                    clearTimeout(joinTimeout); showCustomPopup("입장 불가", "존재하지 않는 방입니다.", "❌", "bg-red-600"); window.renderHome(); 
                } 
            });
        } catch(e) { }

        setTimeout(() => { if(!myData) sendPlayerAction({ type: 'JOIN', uid: myUid, name: n }); }, 500);
    };

    const handleAttacked = (data) => {
        window.playSound('attacked');
        if(data.attackType === 'swap') {
            window.vibrateDevice([200, 100, 200]); window.flashScreen('bg-red-500/50');
            showCustomPopup('🚨 비상 사태!', `${data.from}님이 [운명의 부름]으로\n당신의 자산과 맞바꿨습니다!`, '⚖️', 'bg-red-700');
        } else if (data.attackType === 'steal') {
            window.vibrateDevice([100, 100, 100]); window.flashScreen('bg-purple-500/50');
            showCustomPopup('💸 소매치기 당함!', `${data.from}님이 당신의 현금\n${data.amt.toLocaleString()}원을 훔쳐갔습니다!`, '🥷', 'bg-purple-700');
        } else if (data.attackType === 'robinhood') {
            window.vibrateDevice([100, 100, 100]); window.flashScreen('bg-green-500/50');
            showCustomPopup('🏹 화살 피격!', `${data.from}님이 로빈훗의 화살로\n당신의 현금 ${data.amt.toLocaleString()}원을 빼앗았습니다!`, '🏹', 'bg-green-800');
        }
    };

    // --- Player Game UI Engine ---
    window.switchTab = (tab) => { 
        currentTab = tab; 
        window.vibrateDevice(10); 
        document.getElementById('player-game-container').outerHTML = '';
        renderPlayerGame(); 
    };

    let isUpdatingUI = false;
    window.updatePlayerGameUI = () => {
        if(!myData || !document.getElementById('player-game-container') || isUpdatingUI) return;
        
        isUpdatingUI = true;
        requestAnimationFrame(() => {
            if (lastNewsMsg && lastNewsMsg !== roomState.news) {
                window.flashScreen('bg-yellow-500/20');
                window.vibrateDevice([100, 50, 100, 50, 100]);
                window.playSound('siren');
                document.getElementById('app-container').classList.add('shake-screen');
                setTimeout(() => document.getElementById('app-container').classList.remove('shake-screen'), 500);
                
                const nEl = document.getElementById('news-ticker-container');
                if(nEl) { nEl.classList.add('bg-red-600'); setTimeout(() => nEl.classList.remove('bg-red-600'), 1000); }
            }
            lastNewsMsg = roomState.news;
            
            checkFreezeState();

            const isBlinded = myData.blindedUntil && Date.now() < myData.blindedUntil;
            const cbActive = roomState.circuitBreakerUntil && Date.now() < roomState.circuitBreakerUntil;

            let totalAsset = myData.cash;
            const myStocks = Object.entries(myData.portfolio || {}).filter(([_, amt]) => amt > 0);
            myStocks.forEach(([sId, amt]) => {
                const s = roomState.stocks.find(x => x.id === sId);
                if(s) totalAsset += s.price * amt;
            });

            const assetEl = document.getElementById('player-total-asset');
            const cashEl = document.getElementById('player-cash');
            if(assetEl) assetEl.innerText = `${totalAsset.toLocaleString()} 원`;
            if(cashEl) cashEl.innerText = `보유 현금 ${myData.cash.toLocaleString()}`;

            const newsEl = document.getElementById('player-news-content');
            const newsIcon = document.getElementById('news-icon');
            if(newsEl) {
                const newsHtml = `<span class="text-[10px] font-black ${roomState.phase === 'hint' ? 'bg-yellow-500 text-black' : 'bg-red-500 text-white'} px-1.5 py-0.5 rounded mr-1.5 inline-block mb-1 shadow-sm">${roomState.phase === 'hint' ? '1분 후 변동' : '현재 결과'}</span><br>${roomState.news}`;
                if (newsEl.dataset.lastHtml !== newsHtml) {
                    newsEl.innerHTML = newsHtml;
                    newsEl.dataset.lastHtml = newsHtml;
                    if(newsIcon) newsIcon.innerText = roomState.phase === 'hint' ? '🤔' : '📰';
                }
            }

            const marketEl = document.getElementById('market-grid');
            if(marketEl && currentTab === 'market') {
                const marketHtml = roomState.stocks.map(s => {
                    const diff = s.history.length>1 ? s.price - s.history[s.history.length-2] : 0;
                    const dispName = isBlinded ? '???' : s.name;
                    const dispPrice = isBlinded ? '???' : s.price.toLocaleString();
                    const diffClass = isBlinded ? 'text-slate-500' : (diff>0 ? 'stock-up' : (diff<0 ? 'stock-down' : 'text-slate-500'));
                    const bgClass = isBlinded ? 'bg-slate-800/80 border-slate-600' : (diff>0 ? 'bg-red-900/20 border-red-500/50' : (diff<0 ? 'bg-blue-900/20 border-blue-500/50' : 'bg-slate-800 border-slate-600'));
                    const diffText = isBlinded ? '- ???' : `${diff>0?'▲':(diff<0?'▼':'-')} ${Math.abs(diff).toLocaleString()}`;
                    const maxBuy = Math.floor(myData.cash / s.price);
                    const disableBuy = cbActive || maxBuy < 1;
                    
                    return `
                    <div class="p-2 rounded-xl border ${bgClass} shadow-sm transition-colors duration-300 flex flex-col justify-between h-full bg-glass">
                        <div class="flex justify-between items-start mb-1">
                            <div class="font-black text-[11px] md:text-xs text-white leading-tight break-keep pr-1 ${isBlinded ? 'blinded-text' : ''}">${dispName}</div>
                        </div>
                        <div class="text-right mb-1.5 mt-auto">
                            <div class="font-black text-sm md:text-base ${diff!==0 && !isBlinded ? 'price-update' : ''} text-white ${isBlinded ? 'blinded-text' : ''}">${dispPrice}</div>
                            <div class="text-[9px] md:text-[10px] font-bold ${diffClass}">${diffText}</div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="window.buyStock('${s.id}', 1)" class="flex-1 bg-slate-700/80 hover:bg-slate-600 text-white py-1 rounded text-[9px] md:text-[10px] font-bold shadow active:scale-95 transition" ${disableBuy?'disabled style="opacity:0.3"':''}>1주</button>
                            <button onclick="window.buyStock('${s.id}', ${maxBuy})" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white py-1 rounded text-[9px] md:text-[10px] font-black shadow-sm active:scale-95 transition" ${disableBuy?'disabled style="opacity:0.3"':''}>MAX</button>
                        </div>
                    </div>`;
                }).join('');
                
                if (marketEl.dataset.lastHtml !== marketHtml) {
                    marketEl.innerHTML = marketHtml;
                    marketEl.dataset.lastHtml = marketHtml;
                }
            }

            const portEl = document.getElementById('portfolio-list');
            if(portEl && currentTab === 'portfolio') {
                let portHtml = myStocks.length === 0 ? '<div class="text-center text-slate-500 py-10 font-bold bg-slate-800/30 rounded-xl border border-slate-700 border-dashed text-sm">보유 종목이 없습니다.</div>' : '';
                myStocks.forEach(([sId, amt]) => {
                    const s = roomState.stocks.find(x => x.id === sId);
                    if(s) {
                        const avgPrice = myData.avgPrice && myData.avgPrice[sId] ? myData.avgPrice[sId] : s.price;
                        const returnRate = avgPrice > 0 ? ((s.price - avgPrice) / avgPrice) * 100 : 0;
                        
                        const dispName = isBlinded ? '???' : s.name;
                        const dispPriceStr = isBlinded ? '???' : (s.price*amt).toLocaleString();
                        const dispAvgStr = isBlinded ? '???' : Math.round(avgPrice).toLocaleString();
                        
                        const returnClass = isBlinded ? 'text-slate-500' : (returnRate > 0 ? 'text-red-400' : (returnRate < 0 ? 'text-blue-400' : 'text-green-400'));
                        const returnIcon = isBlinded ? '-' : (returnRate > 0 ? '▲' : (returnRate < 0 ? '▼' : '-'));
                        const returnText = isBlinded ? '???' : Math.abs(returnRate).toFixed(1);

                        portHtml += `
                            <div class="bg-slate-800 p-3 md:p-4 rounded-xl mb-2.5 border border-slate-600 shadow-md flex items-center justify-between">
                                <div>
                                    <div class="font-black text-white text-sm md:text-base ${isBlinded ? 'blinded-text' : ''}">${dispName}</div>
                                    <div class="text-slate-400 text-[10px] md:text-xs mt-0.5 font-bold ${isBlinded ? 'blinded-text' : ''}">${amt}주 (평단: ${dispAvgStr}원)</div>
                                </div>
                                <div class="text-right flex flex-col items-end">
                                    <div class="font-black ${isBlinded ? 'text-slate-500 blinded-text' : (returnRate > 0 ? 'text-red-400' : (returnRate < 0 ? 'text-blue-400' : 'text-green-400'))} text-base md:text-lg leading-none mb-1">${dispPriceStr}원</div>
                                    <div class="text-[10px] md:text-xs font-bold ${returnClass} mb-1.5">${returnIcon} ${returnText}%</div>
                                    <div class="flex gap-1.5">
                                        <button onclick="window.sellStock('${sId}', ${Math.max(1, Math.floor(amt/2))})" class="bg-slate-600 hover:bg-slate-500 text-white px-2 py-1 md:px-3 md:py-1.5 rounded-md text-[10px] md:text-xs font-bold shadow active:scale-95 transition" ${cbActive?'disabled style="opacity:0.3"':''}>절반매도</button>
                                        <button onclick="window.sellStock('${sId}', 'ALL')" class="bg-blue-600 hover:bg-blue-500 text-white px-2 py-1 md:px-3 md:py-1.5 rounded-md text-[10px] md:text-xs font-black shadow active:scale-95 transition" ${cbActive?'disabled style="opacity:0.3"':''}>전량매도</button>
                                    </div>
                                </div>
                            </div>`;
                    }
                });
                
                if (portEl.dataset.lastHtml !== portHtml) {
                    portEl.innerHTML = portHtml;
                    portEl.dataset.lastHtml = portHtml;
                }
            }

            const itemsEl = document.getElementById('inventory-list');
            if(itemsEl && currentTab === 'portfolio') {

    const generateQuizHtml = () => {

        if (isWaitingForResult) return `

                while (wrongOpts.length < 2 && attempts < 100) {
                    const wrong = roomState.words[Math.floor(Math.random() * roomState.words.length)].meaning;
                    if (wrong !== w.meaning && !wrongOpts.includes(wrong)) {
                        wrongOpts.push(wrong);
                    }
                    attempts++;
                }

                </div>
                
                <div class="mt-8 flex justify-center">
                    ${isHost ? `
                        <button onclick="window.hostGoRankings()" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-black text-xl py-5 px-12 rounded-2xl shadow-[0_0_30px_rgba(79,70,229,0.5)] active:scale-95 transition">
                            최종 시상식 발표하기 <i class="fas fa-arrow-right ml-2"></i>
                        </button>
                    ` : `
                        <div class="text-slate-400 font-bold text-lg animate-pulse">호스트가 시상식을 준비하고 있습니다... 🏆</div>
                    `}
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
    };

    window.hostGoRankings = () => {
        if(currentRole !== 'host') return;
        roomState.endPhase = 'rankings';
        if(myConn) sendPlayerAction({type: 'HOST_NEXT_PHASE'});
        hostBroadcast();
    };

    const renderEndScreen = () => {
        let sorted = players.map(p=>{
            let t=p.cash; let stockVal = 0; let totalCost = 0;
            Object.entries(p.portfolio||{}).forEach(([k,v])=>{
                const s=roomState.stocks.find(x=>x.id===k);
                if(s && v>0) {
                    stockVal += s.price * v;
                    totalCost += (p.avgPrice && p.avgPrice[k] ? p.avgPrice[k] : s.price) * v;
                }
            });
            t += stockVal;
            let returnRate = totalCost > 0 ? ((stockVal - totalCost) / totalCost) * 100 : 0;
            return {...p, total: t, returnRate, stockVal}; // 주식 평가액 추가 저장
        }).sort((a,b)=>b.total-a.total);

        if(sorted.length===0) return document.getElementById('app').innerHTML=`<div class="m-auto"><button onclick="window.renderHome()" class="bg-blue-600 px-4 py-2 rounded font-bold">돌아가기</button></div>`;
        
        let awards = [];
        const activePlayers = sorted.filter(p => p.tradeCount > 0);
        const byReturn = [...activePlayers].sort((a,b) => b.returnRate - a.returnRate);

        awards.push({ t:"👑 주식의 신", d:"최종 자산 1위", n:sorted[0].name, v:sorted[0].total.toLocaleString()+'원', color: "text-yellow-400", bg: "border-yellow-500" });

        // '대송 버핏' 어워드 추가
        const maxStockP = [...sorted].sort((a,b) => b.stockVal - a.stockVal)[0];
        if(maxStockP && maxStockP.stockVal > 0) {
            awards.push({ t:"🎩 대송 버핏", d:"주식 자산 1위", n:maxStockP.name, v:maxStockP.stockVal.toLocaleString()+'원', color: "text-blue-400", bg: "border-blue-500" });
        }

        if(byReturn.length > 0 && byReturn[0].returnRate > 0) {
            awards.push({ t:"🚀 존버왕", d:"투자 수익률 1위", n:byReturn[0].name, v:`+${byReturn[0].returnRate.toFixed(1)}%`, color: "text-red-400", bg: "border-red-500" });
        }

        const qK = [...sorted].sort((a,b)=>(b.correctAnswers||0)-(a.correctAnswers||0))[0];
        if(qK && qK.correctAnswers>0) awards.push({ t:"🎓 단어장 마스터", d:"정답 횟수 1위", n:qK.name, v:qK.correctAnswers+'번 정답', color: "text-emerald-400", bg: "border-emerald-500" });
        
        const wK = [...sorted].sort((a,b)=>(b.earnedFromQuiz||0)-(a.earnedFromQuiz||0))[0];
        if(wK && wK.earnedFromQuiz>0) awards.push({ t:"💦 땀흘린 개미", d:"퀴즈 확보 자금 1위", n:wK.name, v:wK.earnedFromQuiz.toLocaleString()+'원', color: "text-orange-400", bg: "border-orange-500" });

        const tK = [...sorted].sort((a,b)=>(b.tradeCount||0)-(a.tradeCount||0))[0];
        if(tK && tK.tradeCount>0) awards.push({ t:"⚡ 야수의 심장", d:"최다 거래 (단타 장인)", n:tK.name, v:tK.tradeCount+'회', color: "text-purple-400", bg: "border-purple-500" });

        // '마이너스의 손'을 제거하고 '올해의 광대'로 대체
        if(byReturn.length > 0 && byReturn[byReturn.length-1].returnRate < 0) {
            const clown = byReturn[byReturn.length-1];
            awards.push({ t:"🤡 올해의 광대", d:"투자 손실률 1위", n:clown.name, v:`${clown.returnRate.toFixed(1)}%`, color: "text-slate-400", bg: "border-slate-500" });
        }

        let p1 = sorted[0] || {name: '없음', total: 0};
        let p2 = sorted[1] || {name: '없음', total: 0};
        let p3 = sorted[2] || {name: '없음', total: 0};

        document.getElementById('app').innerHTML = `
            <div class="p-4 max-w-6xl mx-auto w-full fade-in pt-6 h-full flex flex-col">
                <div class="text-6xl text-center mb-1 animate-bounce drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">🎊</div>
                <h1 class="text-4xl md:text-5xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 mb-8 drop-shadow-md">최종 시상식</h1>
                
                <div class="flex flex-col lg:flex-row gap-8 flex-grow overflow-hidden">
                    <div class="flex-1 flex flex-col gap-6 overflow-y-auto custom-scrollbar pr-2 pb-4">
                        <div class="flex items-end justify-center gap-3 h-56 md:h-64 mt-4">
                            <div class="flex flex-col items-center w-[30%] animate-[slideUp_0.8s_ease-out_0.3s_both]">
                                <div class="text-xl md:text-2xl font-black truncate w-full text-center text-slate-200 mb-2 px-1 drop-shadow-md">${p2.name}</div>
                                <div class="w-full bg-gradient-to-b from-slate-300 to-slate-600 rounded-t-2xl h-28 md:h-32 flex flex-col items-center justify-start pt-3 shadow-[0_0_25px_rgba(148,163,184,0.4)] border-t border-slate-100">
                                    <span class="text-4xl drop-shadow-md">🥈</span>
                                    <span class="font-black text-slate-900 text-sm mt-2 px-1 break-all">${p2.total.toLocaleString()}원</span>
                                </div>
                            </div>
                            <div class="flex flex-col items-center w-[35%] animate-[slideUp_0.8s_ease-out_0.9s_both] z-10">
                                <div class="text-4xl animate-pulse mb-2 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)]">👑</div>
                                <div class="text-2xl md:text-3xl font-black truncate w-full text-center text-yellow-400 mb-2 px-1 drop-shadow-md">${p1.name}</div>
                                <div class="w-full bg-gradient-to-b from-yellow-300 to-yellow-600 rounded-t-2xl h-40 md:h-48 flex flex-col items-center justify-start pt-4 shadow-[0_0_35px_rgba(234,179,8,0.6)] border-t border-yellow-100">
                                    <span class="text-5xl drop-shadow-md">🥇</span>
                                    <span class="font-black text-yellow-900 text-base mt-2 px-1 break-all">${p1.total.toLocaleString()}원</span>
                                </div>
                            </div>
                            <div class="flex flex-col items-center w-[30%] animate-[slideUp_0.8s_ease-out_0s_both]">
                                <div class="text-xl md:text-2xl font-black truncate w-full text-center text-orange-300 mb-2 px-1 drop-shadow-md">${p3.name}</div>
                                <div class="w-full bg-gradient-to-b from-orange-400 to-orange-700 rounded-t-2xl h-20 md:h-24 flex flex-col items-center justify-start pt-2 shadow-[0_0_20px_rgba(249,115,22,0.4)] border-t border-orange-200">
                                    <span class="text-3xl drop-shadow-md">🥉</span>
                                    <span class="font-black text-orange-900 text-xs mt-1 px-1 break-all">${p3.total.toLocaleString()}원</span>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                            ${awards.map(a=>`
                                <div class="bg-glass p-4 rounded-2xl text-center border ${a.bg} shadow-xl transform transition hover:scale-105">
                                    <div class="text-base font-black ${a.color} mb-1 drop-shadow-sm">${a.t}</div>
                                    <div class="text-xs font-bold text-slate-300 mb-2 truncate">${a.d}</div>
                                    <div class="text-xl font-black text-white bg-slate-800/80 rounded-xl py-2 mb-2 truncate px-2 border border-slate-600 shadow-inner">${a.n}</div>
                                    <div class="text-emerald-400 font-black text-sm drop-shadow-md">${a.v}</div>
                                </div>`).join('')}
                        </div>
                    </div>
                    
                    <div class="lg:w-1/3 w-full bg-glass p-6 rounded-3xl border border-slate-600 shadow-2xl flex flex-col max-h-[500px] lg:max-h-full">
                        <h3 class="font-black text-2xl mb-4 text-white flex items-center border-b border-slate-600 pb-3"><i class="fas fa-list-ol mr-3 text-blue-400"></i>전체 랭킹</h3>
                        <div class="flex-grow overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-2">
                            ${sorted.map((p,i)=>`
                                <div class="flex justify-between items-center px-4 py-3 ${i===0?'bg-gradient-to-r from-yellow-900/60 to-slate-800 border border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.2)]':'bg-slate-800 border border-slate-700 shadow-md'} rounded-xl text-base">
                                    <span class="font-black flex items-center truncate flex-1"><span class="w-8 text-center mr-3 ${i===0?'text-yellow-400 text-2xl':(i===1?'text-slate-300 text-xl':(i===2?'text-orange-400 text-xl':'text-slate-500 text-lg'))}">${i+1}</span> <span class="truncate text-white">${p.name}</span></span>
                                    <span class="text-green-400 font-black shrink-0 text-xl ml-2">${p.total.toLocaleString()}원</span>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>
                
                <button onclick="window.clearSession()" class="w-full mt-6 bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 border border-slate-500 py-5 rounded-2xl font-black text-xl shadow-2xl active:scale-95 transition text-white shrink-0">
                    <i class="fas fa-home mr-2"></i>접속 기록 초기화 후 처음 화면으로
                </button>
            </div>`;
    };

    window.renderHome();
</script>
</body>
</html>
